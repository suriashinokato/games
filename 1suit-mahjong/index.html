<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メンチン麻雀</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- タイトル画面 -->
    <div id="screen-title" class="screen">
      <h1 class="title">メンチン麻雀</h1>
      <p class="subtitle">1 種類の牌だけで遊ぶ 2 人麻雀</p>
      <ul class="rule-summary">
        <li>使用牌は萬子・筒子・索子から<strong>局ごとにランダム</strong>で決定</li>
        <li>1〜9 を各 4 枚 = 計 36 枚で対局</li>
        <li>持ち点 100,000 → 200,000 でクリア / 0 でゲームオーバー</li>
      </ul>
      <div class="title-actions">
        <button id="start-btn" class="big-btn">START</button>
        <button id="help-title-btn" class="link-btn">ヘルプ・操作マニュアル</button>
      </div>
    </div>

    <!-- 対局画面 -->
    <div id="screen-table" class="screen" style="display:none;">
      <div class="info-bar">
        <span>第 <b id="info-round">-</b> 局</span>
        <span>山残 <b id="info-wall">-</b></span>
        <div class="info-bar-actions">
          <button id="home-table-btn" class="info-help-btn">ホームへ</button>
          <button id="help-table-btn" class="info-help-btn">ヘルプ</button>
        </div>
      </div>

      <div class="player-area area-cpu">
        <div class="player-name">
          相手 <span id="score-cpu">-</span> 点
          <span class="dealer-mark" id="dealer-cpu" style="display:none;">親</span>
          <span class="riichi-mark" id="riichi-cpu" style="display:none;">立直</span>
        </div>
        <div class="hand-section">
          <div class="hand-row" id="hand-cpu"></div>
          <div class="meld-row" id="melds-cpu"></div>
        </div>
        <div class="discard" id="discard-cpu"></div>
      </div>

      <div class="player-area area-self">
        <div class="discard" id="discard-player"></div>
        <div class="hand-section">
          <div class="hand-row" id="hand-player"></div>
          <div class="meld-row" id="melds-player"></div>
        </div>
        <div class="player-name">
          自分 <span id="score-player">-</span> 点
          <span class="dealer-mark" id="dealer-player" style="display:none;">親</span>
          <span class="riichi-mark" id="riichi-player" style="display:none;">立直</span>
        </div>
        <div class="action-bar" id="action-bar"></div>
      </div>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="screen-gameover" class="screen" style="display:none;">
      <h1 class="title">GAME OVER</h1>
      <p style="text-align:center;">持ち点が 0 になりました。</p>
      <button id="restart-gameover-btn" class="big-btn">タイトルへ</button>
    </div>

    <!-- クリア画面 -->
    <div id="screen-clear" class="screen" style="display:none;">
      <h1 class="title">CLEAR!</h1>
      <p style="text-align:center;">持ち点 200,000 を達成しました。</p>
      <button id="restart-clear-btn" class="big-btn">タイトルへ</button>
    </div>

    <!-- 結果ダイアログ（流局・アガリ等） -->
    <div id="result-dialog" class="dialog" style="display:none;"></div>

  </div>

  <script src="js/tiles.js?v=20260503b"></script>
  <script src="js/handEval.js?v=20260503b"></script>
  <script src="js/yaku.js?v=20260503b"></script>
  <script src="js/score.js?v=20260503b"></script>
  <script src="js/cpu.js?v=20260503b"></script>
  <script src="js/game.js?v=20260504a"></script>
  <script src="js/ui.js?v=20260503b"></script>
  <script src="js/main.js?v=20260503b"></script>
</body>
</html>
