<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>孤立牌優劣比較</title>
  <link rel="icon" type="image/svg+xml" href="../shared/brand/koritsuhai-logo.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="../shared/brand/koritsuhai-logo-180.png">
  <link rel="manifest" href="../koritsuhai.webmanifest">
  <meta name="theme-color" content="#3a2e22">
  <meta name="apple-mobile-web-app-title" content="孤立牌">
  <style>
    :root {
      --bg-page:       #e8e0d0;
      --bg-card:       #fdf6e3;
      --bg-commentary: #f5f0e8;
      --border-tile:   #c8b89a;
      --border-gold:   #c9a84c;
      --accent-green:  #4caf50;
      --accent-red:    #e53935;
      --accent-gold:   #c9a84c;
      --text-main:     #3a2e22;
      --text-sub:      #7a6a55;
      --shadow-tile:   0 4px 12px rgba(0,0,0,0.18);
      --radius:        8px;
      --font:          'Noto Serif JP', 'Hiragino Mincho ProN', Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 1.6rem;
      letter-spacing: 0.12em;
    }
    header p {
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-top: 4px;
      letter-spacing: 0.06em;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      font-size: 0.82rem;
      color: var(--text-sub);
      text-decoration: none;
      letter-spacing: 0.06em;
    }
    .back-link:hover { color: var(--text-main); }

    /* タブ */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 720px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid var(--border-gold);
      border-radius: var(--radius);
      background: var(--bg-card);
      color: var(--text-sub);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active {
      background: var(--accent-gold);
      color: #fff;
      border-color: var(--accent-gold);
    }

    /* 凡例 */
    .legend {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 0.78rem;
      color: var(--text-sub);
      letter-spacing: 0.06em;
    }
    .legend-arrow {
      flex: 1;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-red), var(--accent-gold) 50%, var(--accent-green));
      border-radius: 2px;
      margin: 0 10px;
    }

    /* ランキングリスト */
    .rank-list {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rank-item {
      display: flex;
      align-items: stretch;
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(0,0,0,0.09);
      overflow: hidden;
    }

    /* 牌画像 */
    .rank-tile-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 120px;
      flex-shrink: 0;
      padding: 10px 8px;
      border-right: 1px solid #e0d8c8;
      border-left-width: 4px;
      border-left-style: solid;
    }
    .rank-tile-wrap img {
      max-width: 104px;
      max-height: 30px;
      object-fit: contain;
    }
    .rank-tile-placeholder {
      width: 68px;
      height: 90px;
      background: #f0ebe0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--text-sub);
      text-align: center;
      padding: 4px;
    }
    .rank-tile-name {
      font-size: 0.72rem;
      color: var(--text-sub);
      margin-top: 4px;
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* 考察 */
    .rank-commentary {
      flex: 1;
      padding: 12px 14px;
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text-main);
      white-space: pre-wrap;
      display: flex;
      align-items: center;
    }

    /* モバイル */
    @media (max-width: 480px) {
      header h1 { font-size: 1.3rem; }

      .rank-badge { width: 42px; }
      .rank-num { font-size: 0.95rem; }

      .rank-tile-wrap { width: 108px; }
      .rank-tile-wrap img { max-width: 96px; max-height: 30px; }

      .rank-commentary { font-size: 0.8rem; padding: 10px 10px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>孤立牌優先順位一覧</h1>

  </header>

  <a class="back-link" href="../koritsuhai.html">← 優劣比較に戻る</a>

  function rankColor(rank, total) {
    const t = total > 1 ? (rank - 1) / (total - 1) : 0;
    const stops = [
      [229, 57, 53],   // 赤 #e53935
      [201, 168, 76],  // 金 #c9a84c
      [76, 175, 80]    // 緑 #4caf50
    ];
    const seg = t < 0.5 ? 0 : 1;
    const u = t < 0.5 ? t * 2 : (t - 0.5) * 2;
    const a = stops[seg], b = stops[seg + 1];
    const r  = Math.round(a[0] + (b[0] - a[0]) * u);
    const g  = Math.round(a[1] + (b[1] - a[1]) * u);
    const bl = Math.round(a[2] + (b[2] - a[2]) * u);
    return 'rgb(' + r + ', ' + g + ', ' + bl + ')';
  }

  function showMode(mode) {
    // タブ切替
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.classList.remove('active');
    });
    document.getElementById('tab-' + mode).classList.add('active');

    // ランキング表示（rank 昇順 = 弱い順）
    const tiles = TILES[mode].slice().sort(function(a, b) { return a.rank - b.rank; });
    const total = tiles.length;
    const list  = document.getElementById('rank-list');
    list.innerHTML = '';

    tiles.forEach(function(tile) {
      const item = document.createElement('div');
      item.className = 'rank-item';

      // 牌画像
      const tileWrap = document.createElement('div');
      tileWrap.className = 'rank-tile-wrap';
      tileWrap.style.borderLeftColor = rankColor(tile.rank, total);

      const img = document.createElement('img');
      img.src = tile.image;
      img.alt = tile.label;
      img.onerror = function() {
        img.style.display = 'none';
        const ph = document.createElement('div');
        ph.className = 'rank-tile-placeholder';
        ph.textContent = tile.label;
        tileWrap.insertBefore(ph, img.nextSibling);
      };

      const tileName = document.createElement('div');
      tileName.className = 'rank-tile-name';
      tileName.textContent = tile.label;

      tileWrap.appendChild(img);
      tileWrap.appendChild(tileName);

      // 考察
      const comm = document.createElement('div');
      comm.className = 'rank-commentary';
      comm.textContent = tile.commentary;

      item.appendChild(tileWrap);
      item.appendChild(comm);
      list.appendChild(item);
    });
  }

  showMode('19');

</body>
</html>
