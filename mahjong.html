<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麻雀牌優劣クイズ</title>
  <style>
    /* ===== カスタムプロパティ ===== */
    :root {
      --bg-page:       #e8e0d0;
      --bg-card:       #fdf6e3;
      --bg-commentary: #f5f0e8;
      --border-tile:   #c8b89a;
      --border-gold:   #c9a84c;
      --accent-green:  #4caf50;
      --accent-red:    #e53935;
      --accent-gold:   #c9a84c;
      --text-main:     #3a2e22;
      --text-sub:      #7a6a55;
      --shadow-tile:   0 4px 12px rgba(0,0,0,0.18);
      --shadow-hover:  0 8px 22px rgba(0,0,0,0.28);
      --tile-w:        160px;
      --tile-h:        220px;
      --radius:        8px;
      --font:          'Noto Serif JP', 'Hiragino Mincho ProN', Georgia, serif;
    }

    /* ===== リセット・基盤 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ===== 画面共通 ===== */
    .screen { display: none; width: 100%; max-width: 640px; }
    .screen.active { display: block; }

    /* ===== アニメーション ===== */
    @keyframes pulse-correct {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    @keyframes shake-wrong {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== ヘッダー ===== */
    header {
      text-align: center;
      margin-bottom: 28px;
    }
    header h1 {
      font-size: 1.6rem;
      letter-spacing: 0.12em;
      color: var(--text-main);
    }
    header p {
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-top: 4px;
      letter-spacing: 0.06em;
    }

    /* ===== カード ===== */
    .card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 28px 24px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
    }

    /* ===== ホーム画面 ===== */
    .home-subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-sub);
      margin-bottom: 24px;
      line-height: 1.7;
    }

    .mode-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .btn-mode {
      flex: 1;
      max-width: 220px;
      padding: 18px 12px;
      border: 2px solid var(--border-gold);
      border-radius: var(--radius);
      background: var(--bg-card);
      color: var(--text-main);
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.18s, box-shadow 0.18s, transform 0.12s;
    }
    .btn-mode:hover {
      background: #fff8ea;
      box-shadow: 0 4px 14px rgba(201,168,76,0.35);
      transform: translateY(-2px);
    }
    .btn-mode span.mode-label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-sub);
      font-weight: normal;
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    /* ===== スコアサマリー ===== */
    .score-summary {
      border-top: 1px solid #e0d8c8;
      padding-top: 20px;
    }
    .score-summary h3 {
      font-size: 0.82rem;
      color: var(--text-sub);
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      text-align: center;
    }
    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .score-item {
      background: var(--bg-commentary);
      border-radius: var(--radius);
      padding: 12px 14px;
      text-align: center;
    }
    .score-item .mode-name {
      font-size: 0.75rem;
      color: var(--text-sub);
      letter-spacing: 0.08em;
    }
    .score-item .best-val {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--accent-gold);
      margin-top: 2px;
    }
    .score-item .best-label {
      font-size: 0.7rem;
      color: var(--text-sub);
    }

    /* ===== クイズ画面 ===== */

    /* 進捗 */
    #progress-text {
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-sub);
      margin-bottom: 10px;
      letter-spacing: 0.08em;
    }

    #progress-bar {
      width: 100%;
      height: 6px;
      background: #e0d8c8;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-gold), #e8c060);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* 牌エリア */
    #tile-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .tile-slot {
      width: var(--tile-w);
      height: var(--tile-h);
      border: 3px solid var(--border-tile);
      border-radius: var(--radius);
      box-shadow: var(--shadow-tile);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s;
      overflow: hidden;
      position: relative;
      user-select: none;
    }
    .tile-slot:not(.answered):hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: var(--shadow-hover);
      border-color: var(--border-gold);
    }
    .tile-slot img {
      max-width: 90%;
      max-height: 75%;
      object-fit: contain;
    }
    .tile-slot .tile-label {
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--text-sub);
      letter-spacing: 0.06em;
    }

    /* 画像エラー時のプレースホルダー */
    .tile-slot .tile-placeholder {
      width: 80%;
      height: 70%;
      background: #f0ebe0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--text-sub);
      text-align: center;
      padding: 8px;
    }

    /* 正解・不正解スタイル */
    .tile-slot.correct {
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(76,175,80,0.3), var(--shadow-tile);
      animation: pulse-correct 0.45s ease;
    }
    .tile-slot.wrong {
      border-color: var(--accent-red);
      box-shadow: 0 0 0 3px rgba(229,57,53,0.3), var(--shadow-tile);
      animation: shake-wrong 0.4s ease;
    }
    .tile-slot.answered {
      cursor: default;
      pointer-events: none;
    }

    /* 正解バッジ */
    .tile-slot .badge {
      display: none;
      position: absolute;
      top: 6px;
      right: 6px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: bold;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .tile-slot.correct .badge,
    .tile-slot.wrong .badge { display: flex; }
    .tile-slot.correct .badge { background: var(--accent-green); }
    .tile-slot.wrong .badge   { background: var(--accent-red); }

    /* VS */
    .vs-divider {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--text-sub);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    /* フィードバックエリア */
    #feedback-area {
      display: none;
      animation: fade-in 0.3s ease;
    }
    #feedback-area.visible { display: block; }

    #feedback-text {
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 14px;
      letter-spacing: 0.08em;
    }
    #feedback-text.correct { color: var(--accent-green); }
    #feedback-text.wrong   { color: var(--accent-red); }

    #commentary-box {
      margin-bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .commentary-entry {
      border-left: 4px solid var(--border-tile);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 12px 16px;
      font-size: 0.92rem;
      line-height: 1.85;
      color: var(--text-main);
      background: var(--bg-commentary);
    }
    .commentary-inferior {
      border-left-color: var(--accent-red);
    }
    .commentary-superior {
      border-left-color: var(--accent-green);
    }
    .commentary-entry .commentary-label {
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .commentary-inferior .commentary-label { color: var(--accent-red); }
    .commentary-superior .commentary-label { color: var(--accent-green); }

    /* 次の問題ボタン */
    #next-btn {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--accent-gold);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }
    #next-btn:hover {
      background: #b8943a;
      transform: translateY(-1px);
    }

    /* ===== 結果画面 ===== */
    .result-score {
      text-align: center;
      margin-bottom: 24px;
    }
    .result-score .score-num {
      font-size: 3rem;
      font-weight: bold;
      color: var(--accent-gold);
      line-height: 1;
    }
    .result-score .score-denom {
      font-size: 1.1rem;
      color: var(--text-sub);
      margin-left: 4px;
    }
    .result-score .score-label {
      font-size: 0.88rem;
      color: var(--text-sub);
      margin-top: 6px;
      letter-spacing: 0.08em;
    }
    .result-score .new-best {
      display: inline-block;
      background: var(--accent-gold);
      color: #fff;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 8px;
      letter-spacing: 0.08em;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }
    .btn-secondary {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--border-gold);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-main);
      font-family: var(--font);
      font-size: 0.92rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #fff8ea; }
    .btn-primary {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent-gold);
      color: #fff;
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #b8943a; }

    /* 不正解復習 */
    .wrong-review-title {
      font-size: 0.82rem;
      color: var(--text-sub);
      letter-spacing: 0.1em;
      margin-bottom: 14px;
      padding-top: 20px;
      border-top: 1px solid #e0d8c8;
    }

    .review-item {
      background: var(--bg-commentary);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
      animation: fade-in 0.3s ease;
    }
    .review-item .review-tiles {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .review-tile {
      width: 90px;
      height: 124px;
      border: 2px solid var(--border-tile);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .review-tile img {
      max-width: 88%;
      max-height: 72%;
      object-fit: contain;
    }
    .review-tile .review-tile-label {
      font-size: 0.7rem;
      color: var(--text-sub);
      margin-top: 4px;
    }
    .review-tile.is-inferior {
      border-color: var(--accent-red);
      box-shadow: 0 0 0 2px rgba(229,57,53,0.2);
    }
    .review-tile.is-inferior::after {
      content: '切り推奨';
      display: block;
      font-size: 0.62rem;
      color: var(--accent-red);
      margin-top: 2px;
    }
    .review-vs { font-size: 0.85rem; color: var(--text-sub); flex-shrink: 0; }
    .review-commentary {
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--text-main);
      border-left: 3px solid var(--border-tile);
      padding-left: 10px;
      margin-top: 8px;
    }
    .review-commentary-inferior { border-left-color: var(--accent-red); }
    .review-commentary-superior { border-left-color: var(--accent-green); }
    .review-comm-label {
      display: block;
      font-size: 0.72rem;
      font-weight: bold;
      margin-bottom: 3px;
    }
    .review-commentary-inferior .review-comm-label { color: var(--accent-red); }
    .review-commentary-superior .review-comm-label { color: var(--accent-green); }

    /* ===== モバイル対応 ===== */
    @media (max-width: 480px) {
      :root {
        --tile-w: 130px;
        --tile-h: 180px;
      }

      header h1 { font-size: 1.3rem; }

      .card { padding: 20px 16px; }

      .mode-buttons { flex-direction: column; align-items: center; }
      .btn-mode { max-width: 100%; width: 100%; }

      #tile-area { gap: 12px; }

      .vs-divider { font-size: 0.9rem; }

      .result-actions { flex-direction: column; }

      .review-tile { width: 72px; height: 100px; }
    }
  </style>
</head>
<body>

  <!-- ヘッダー（全画面共通） -->
  <header>
    <h1>孤立牌優劣クイズ</h1>
    <p>孤立牌の強弱を判断する力を鍛えよう</p>
  </header>

  <!-- ===== ホーム画面 ===== -->
  <div id="screen-home" class="screen active">
    <div class="card">
      <p class="home-subtitle">
        2枚の牌姿を見て、<strong>より劣る牌（先に切るべき牌）</strong>を選んでください。<br>
        モードを選んでスタート。
      </p>

      <div class="mode-buttons">
        <button class="btn-mode" id="btn-mode-19">
          19牌クイズ
          <span class="mode-label" id="label-mode-19">1・9の孤立牌を比較</span>
        </button>
        <button class="btn-mode" id="btn-mode-28">
          28牌クイズ
          <span class="mode-label" id="label-mode-28">2・8の孤立牌を比較</span>
        </button>
      </div>

      <div class="score-summary">
        <h3>ベストスコア</h3>
        <div class="score-grid">
          <div class="score-item">
            <div class="mode-name">19牌</div>
            <div class="best-val" id="home-best-19">—</div>
            <div class="best-label" id="home-attempts-19"></div>
          </div>
          <div class="score-item">
            <div class="mode-name">28牌</div>
            <div class="best-val" id="home-best-28">—</div>
            <div class="best-label" id="home-attempts-28"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== クイズ画面 ===== -->
  <div id="screen-quiz" class="screen">
    <div class="card">
      <div id="progress-text">問題 1 / 1</div>
      <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

      <!-- 牌ペア -->
      <div id="tile-area">
        <div class="tile-slot" id="tile-a">
          <div class="badge" id="badge-a"></div>
          <img id="img-a" src="" alt="">
          <div class="tile-label" id="label-a"></div>
          <div class="tile-placeholder" id="placeholder-a" style="display:none"></div>
        </div>

        <div class="vs-divider">VS</div>

        <div class="tile-slot" id="tile-b">
          <div class="badge" id="badge-b"></div>
          <img id="img-b" src="" alt="">
          <div class="tile-label" id="label-b"></div>
          <div class="tile-placeholder" id="placeholder-b" style="display:none"></div>
        </div>
      </div>

      <!-- フィードバック -->
      <div id="feedback-area">
        <div id="feedback-text"></div>
        <div id="commentary-box">
          <div class="commentary-entry commentary-inferior">
            <div class="commentary-label" id="commentary-inferior-label"></div>
            <div id="commentary-inferior-text"></div>
          </div>
          <div class="commentary-entry commentary-superior">
            <div class="commentary-label" id="commentary-superior-label"></div>
            <div id="commentary-superior-text"></div>
          </div>
        </div>
        <button id="next-btn">次の問題 →</button>
      </div>
    </div>
  </div>

  <!-- ===== 結果画面 ===== -->
  <div id="screen-result" class="screen">
    <div class="card">
      <div class="result-score">
        <div>
          <span class="score-num" id="result-correct">0</span>
          <span class="score-denom" id="result-total">/ 0 正解</span>
        </div>
        <div class="score-label" id="result-mode-label"></div>
        <div id="new-best-badge" class="new-best" style="display:none">★ 新記録！</div>
      </div>

      <div class="result-actions">
        <button class="btn-secondary" id="btn-home">モード選択へ</button>
        <button class="btn-primary" id="btn-retry">もう一度</button>
      </div>

      <div id="wrong-review-container" style="display:none">
        <div class="wrong-review-title">不正解の問題を復習</div>
        <div id="wrong-review-list"></div>
      </div>
    </div>
  </div>

  <script>
  'use strict';

  /* =====================================================
     牌の登録
     ─ rank: 数値が小さいほど劣る（= 先に切るべき）
     ─ commentary: この牌が劣る理由（ペア固有の考察は
                   下の PAIR_COMMENTARY で上書き可）
     ─ 画像は images/ フォルダに配置
     ─ 命名規則例: images/1m.png（m=萬子 p=筒子 s=索子）
  ===================================================== */
  const TILES = {
    '19': [
      { id: '147', image: 'images/147.png', label: '147', rank: 1,
        commentary: '5→6と引いて14567の形となっても、まだ4に23の受入がある。その後3を引いても、134567のように1がいらない。' },
      { id: '144', image: 'images/144.png', label: '144', rank: 2,
        commentary: '2,3引きは244,344の強い複合ターツができる。4が唯一のヘッドであれば面子作りに不要な14の1を先に切る。1244の時の3は使われにくい分少し強い。' },
      { id: '14', image: 'images/14.png', label: '14', rank: 3,
        commentary: '2,3は4に受入がある形。' },
      { id: '146', image: 'images/146.png', label: '146', rank: 4,
        commentary: '2引きは4に使われリャンカン、3引きはリャンメンとして使われる。' },
      { id: '145', image: 'images/145.png', label: '145', rank: 5,
        commentary: '2引きで単独ターツだが、3の2度受けとなる。' },
      { id: '124', image: 'images/124.png', label: '124', rank: 6,
        commentary: '2は複合ターツ（3の2度受け）、3は弱い4連形。ヘッドが無い1シャンテンの形によっては孤立1より価値が上がる。' },
      { id: '1224', image: 'images/1224.png', label: '1224', rank: 7,
        commentary: '3の2度受け。12234のペンチャンカンチャンは少し良い連続形。' }
    ],
    '28': [
      { id: '2m', image: 'images/2m.png', label: '2萬', rank: 1,
        commentary: '2萬が劣る理由をここに入力してください。' },
      { id: '8m', image: 'images/8m.png', label: '8萬', rank: 2,
        commentary: '8萬が劣る理由をここに入力してください。' },
      { id: '2p', image: 'images/2p.png', label: '2筒', rank: 3,
        commentary: '2筒が劣る理由をここに入力してください。' },
      { id: '8p', image: 'images/8p.png', label: '8筒', rank: 4,
        commentary: '8筒が劣る理由をここに入力してください。' },
      { id: '2s', image: 'images/2s.png', label: '2索', rank: 5,
        commentary: '2索が劣る理由をここに入力してください。' },
      { id: '8s', image: 'images/8s.png', label: '8索', rank: 6,
        commentary: '8索が劣る理由をここに入力してください。' }
    ]
  };

  /* =====================================================
     ペア固有の考察（省略可能）
     ─ キー形式: "劣る牌のid_優る牌のid"
     ─ 例: '1m_9m' → 1萬 vs 9萬 で1萬が劣る場合の考察
     ─ キーの指定がないペアは劣る牌の commentary を使用
  ===================================================== */
  const PAIR_COMMENTARY = {
    // 例: '1m_9m': '1萬と9萬の比較。この状況では1萬の方が...',
  };

  /* =====================================================
     状態
  ===================================================== */
  const state = {
    mode: null,        // '19' or '28'
    questions: [],     // シャッフル済み問題リスト
    currentIndex: 0,
    correctCount: 0,
    wrongAnswers: [],  // { question, chosen } で復習用
    answered: false    // ダブルクリック防止フラグ
  };

  /* =====================================================
     localStorage ヘルパー
  ===================================================== */
  const STORAGE_KEY = 'mahjong_quiz_data';

  function loadStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultStorage();
      return JSON.parse(raw);
    } catch (_) {
      return defaultStorage();
    }
  }

  function defaultStorage() {
    return {
      '19': { bestScore: null, totalAttempts: 0, wrongIds: [] },
      '28': { bestScore: null, totalAttempts: 0, wrongIds: [] }
    };
  }

  function saveStorage(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (_) {
      // シークレットモード等では無視
    }
  }

  /* =====================================================
     画面切替
  ===================================================== */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) {
      s.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
  }

  /* =====================================================
     Fisher-Yates シャッフル
  ===================================================== */
  function shuffleArray(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  /* =====================================================
     全組み合わせ問題を生成
     ─ TILES[mode] の N 枚から C(N,2) 通りのペアを生成
     ─ inferior は rank が小さい方（同値なら tileA 側）
     ─ 考察は PAIR_COMMENTARY > 劣る牌の commentary の順で参照
  ===================================================== */
  function generateQuestions(mode) {
    const tiles = TILES[mode];
    const questions = [];
    for (let i = 0; i < tiles.length; i++) {
      for (let j = i + 1; j < tiles.length; j++) {
        const t1 = tiles[i];
        const t2 = tiles[j];
        const t1IsInferior = t1.rank <= t2.rank;
        const inferiorTile = t1IsInferior ? t1 : t2;
        const superiorTile = t1IsInferior ? t2 : t1;
        // ペアキー: 劣る牌_優る牌
        const pairKey            = inferiorTile.id + '_' + superiorTile.id;
        const inferiorCommentary = PAIR_COMMENTARY[pairKey] || inferiorTile.commentary;
        const superiorCommentary = superiorTile.commentary;
        questions.push({
          id:                  t1.id + '_vs_' + t2.id,
          tileA:               t1,
          tileB:               t2,
          inferior:            t1IsInferior ? 'A' : 'B',
          inferiorCommentary:  inferiorCommentary,
          superiorCommentary:  superiorCommentary
        });
      }
    }
    return questions;
  }

  /* =====================================================
     クイズ開始
  ===================================================== */
  function startQuiz(mode) {
    const tiles = TILES[mode];
    if (!tiles || tiles.length < 2) {
      alert('このモードの牌が2枚未満です。TILES データを確認してください。');
      return;
    }

    const QUIZ_SIZE = 30;

    // 全組み合わせを生成し、A/B の左右もランダムに入れ替える
    let qs = generateQuestions(mode).map(function(q) {
      if (Math.random() < 0.5) {
        return {
          id:                 q.id,
          tileA:              q.tileB,
          tileB:              q.tileA,
          inferior:           q.inferior === 'A' ? 'B' : 'A',
          inferiorCommentary: q.inferiorCommentary,
          superiorCommentary: q.superiorCommentary
        };
      }
      return q;
    });

    // シャッフルして最大 QUIZ_SIZE 問に絞る
    state.mode         = mode;
    state.questions    = shuffleArray(qs).slice(0, QUIZ_SIZE);
    state.currentIndex = 0;
    state.correctCount = 0;
    state.wrongAnswers = [];
    state.answered     = false;

    showScreen('screen-quiz');
    renderQuestion();
  }

  /* =====================================================
     問題レンダリング
  ===================================================== */
  function renderQuestion() {
    const q     = state.questions[state.currentIndex];
    const total = state.questions.length;
    const idx   = state.currentIndex + 1;

    // 進捗
    document.getElementById('progress-text').textContent =
      '問題 ' + idx + ' / ' + total;
    document.getElementById('progress-fill').style.width =
      ((idx - 1) / total * 100) + '%';

    // 牌スロットをリセット
    resetTileSlot('tile-a', 'img-a', 'label-a', 'placeholder-a', 'badge-a');
    resetTileSlot('tile-b', 'img-b', 'label-b', 'placeholder-b', 'badge-b');

    // 牌画像・ラベルをセット
    setTileSlot('img-a', 'label-a', 'placeholder-a', q.tileA);
    setTileSlot('img-b', 'label-b', 'placeholder-b', q.tileB);

    // フィードバックを非表示
    const fb = document.getElementById('feedback-area');
    fb.classList.remove('visible');

    state.answered = false;
  }

  function resetTileSlot(slotId, imgId, labelId, phId, badgeId) {
    const slot = document.getElementById(slotId);
    slot.classList.remove('correct', 'wrong', 'answered');

    const img = document.getElementById(imgId);
    img.src = '';
    img.style.display = 'block';

    document.getElementById(labelId).textContent = '';
    document.getElementById(phId).style.display = 'none';
    document.getElementById(badgeId).textContent = '';
  }

  function setTileSlot(imgId, labelId, phId, tileData) {
    const img = document.getElementById(imgId);
    const ph  = document.getElementById(phId);

    img.alt = tileData.label;
    img.src = tileData.image;

    // 画像が読み込めなかった場合のフォールバック
    img.onerror = function() {
      img.style.display = 'none';
      ph.textContent = tileData.label;
      ph.style.display = 'flex';
    };

    document.getElementById(labelId).textContent = tileData.label;
  }

  /* =====================================================
     牌クリック処理
  ===================================================== */
  function handleTileClick(chosen) {
    // ダブルクリック防止
    if (state.answered) return;
    state.answered = true;

    const q         = state.questions[state.currentIndex];
    const isCorrect = (chosen === q.inferior);

    if (isCorrect) {
      state.correctCount++;
    } else {
      state.wrongAnswers.push({ question: q, chosen: chosen });
      // 不正解 ID を localStorage に保存
      const data = loadStorage();
      const wrongIds = data[state.mode].wrongIds;
      if (!wrongIds.includes(q.id)) {
        wrongIds.push(q.id);
        saveStorage(data);
      }
    }

    showFeedback(isCorrect, q, chosen);
  }

  /* =====================================================
     フィードバック表示
  ===================================================== */
  function showFeedback(isCorrect, q, chosen) {
    // タイルに CSS クラスを付与
    const slotA = document.getElementById('tile-a');
    const slotB = document.getElementById('tile-b');

    slotA.classList.add('answered');
    slotB.classList.add('answered');

    // 正解スロット = inferior 牌
    const correctSlot = (q.inferior === 'A') ? slotA : slotB;
    const wrongSlot   = (q.inferior === 'A') ? slotB : slotA;

    // 選んだスロット
    const chosenSlot  = (chosen === 'A') ? slotA : slotB;

    if (isCorrect) {
      chosenSlot.classList.add('correct');
      document.getElementById('badge-' + chosen.toLowerCase()).textContent = '○';
    } else {
      chosenSlot.classList.add('wrong');
      document.getElementById('badge-' + chosen.toLowerCase()).textContent = '✕';
      // 正解も緑で表示
      correctSlot.classList.add('correct');
      const correctKey = (q.inferior === 'A') ? 'a' : 'b';
      document.getElementById('badge-' + correctKey).textContent = '○';
    }

    // フィードバックテキスト
    const fbText = document.getElementById('feedback-text');
    if (isCorrect) {
      fbText.textContent = '正解！';
      fbText.className = 'correct';
    } else {
      fbText.textContent = '不正解…';
      fbText.className = 'wrong';
    }

    // 考察（劣る牌・優る牌の両方を表示）
    const inferiorTile = q.inferior === 'A' ? q.tileA : q.tileB;
    const superiorTile = q.inferior === 'A' ? q.tileB : q.tileA;
    document.getElementById('commentary-inferior-label').textContent =
      '【切り推奨】' + inferiorTile.label + ' の考察';
    document.getElementById('commentary-inferior-text').textContent =
      q.inferiorCommentary;
    document.getElementById('commentary-superior-label').textContent =
      '【残す牌】' + superiorTile.label + ' の考察';
    document.getElementById('commentary-superior-text').textContent =
      q.superiorCommentary;

    // 次ボタンのラベル
    const isLast = (state.currentIndex === state.questions.length - 1);
    document.getElementById('next-btn').textContent = isLast ? '結果を見る' : '次の問題 →';

    // フィードバックエリアを表示
    document.getElementById('feedback-area').classList.add('visible');
  }

  /* =====================================================
     次の問題 or 結果へ
  ===================================================== */
  function nextQuestion() {
    state.currentIndex++;
    if (state.currentIndex < state.questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }

  /* =====================================================
     結果画面表示
  ===================================================== */
  function showResult() {
    const total   = state.questions.length;
    const correct = state.correctCount;
    const mode    = state.mode;

    // スコア表示
    document.getElementById('result-correct').textContent = correct;
    document.getElementById('result-total').textContent = '/ ' + total + ' 正解';
    document.getElementById('result-mode-label').textContent =
      mode + '牌クイズ（' + total + '問）';

    // localStorage 更新
    const data = loadStorage();
    const modeData = data[mode];
    modeData.totalAttempts++;

    let isNewBest = false;
    if (modeData.bestScore === null || correct > modeData.bestScore) {
      modeData.bestScore = correct;
      isNewBest = true;
    }
    saveStorage(data);

    // 新記録バッジ
    document.getElementById('new-best-badge').style.display =
      isNewBest ? 'inline-block' : 'none';

    // 不正解復習
    const container = document.getElementById('wrong-review-container');
    if (state.wrongAnswers.length > 0) {
      container.style.display = 'block';
      renderWrongReview(state.wrongAnswers);
    } else {
      container.style.display = 'none';
    }

    showScreen('screen-result');
  }

  /* =====================================================
     不正解復習レンダリング
  ===================================================== */
  function renderWrongReview(wrongAnswers) {
    const list = document.getElementById('wrong-review-list');
    list.innerHTML = '';

    wrongAnswers.forEach(function(entry) {
      const q      = entry.question;
      const item   = document.createElement('div');
      item.className = 'review-item';

      // 牌ペア
      const tilesDiv = document.createElement('div');
      tilesDiv.className = 'review-tiles';

      tilesDiv.appendChild(makeReviewTile(q.tileA, q.inferior === 'A'));
      const vs = document.createElement('div');
      vs.className = 'review-vs';
      vs.textContent = 'VS';
      tilesDiv.appendChild(vs);
      tilesDiv.appendChild(makeReviewTile(q.tileB, q.inferior === 'B'));

      // 考察（劣る牌・優る牌の両方）
      const inferiorTile = q.inferior === 'A' ? q.tileA : q.tileB;
      const superiorTile = q.inferior === 'A' ? q.tileB : q.tileA;

      const commInf = document.createElement('div');
      commInf.className = 'review-commentary review-commentary-inferior';
      commInf.innerHTML = '<span class="review-comm-label">【切り推奨】' +
        inferiorTile.label + '</span>' + q.inferiorCommentary;

      const commSup = document.createElement('div');
      commSup.className = 'review-commentary review-commentary-superior';
      commSup.innerHTML = '<span class="review-comm-label">【残す牌】' +
        superiorTile.label + '</span>' + q.superiorCommentary;

      item.appendChild(tilesDiv);
      item.appendChild(commInf);
      item.appendChild(commSup);
      list.appendChild(item);
    });
  }

  function makeReviewTile(tileData, isInferior) {
    const div = document.createElement('div');
    div.className = 'review-tile' + (isInferior ? ' is-inferior' : '');

    const img = document.createElement('img');
    img.src = tileData.image;
    img.alt = tileData.label;
    img.onerror = function() {
      img.style.display = 'none';
      const ph = document.createElement('div');
      ph.style.cssText = 'font-size:0.75rem;color:#7a6a55;text-align:center;padding:4px';
      ph.textContent = tileData.label;
      div.appendChild(ph);
    };

    const label = document.createElement('div');
    label.className = 'review-tile-label';
    label.textContent = tileData.label;

    div.appendChild(img);
    div.appendChild(label);
    return div;
  }

  /* =====================================================
     ホーム画面のスコア表示
  ===================================================== */
  function renderHomeScores() {
    const data = loadStorage();
    ['19', '28'].forEach(function(mode) {
      const d      = data[mode];
      const tiles  = TILES[mode] || [];
      // C(N,2) = N*(N-1)/2
      const total  = Math.floor(tiles.length * (tiles.length - 1) / 2);
      const bestEl = document.getElementById('home-best-' + mode);
      const attEl  = document.getElementById('home-attempts-' + mode);

      if (d.bestScore !== null) {
        bestEl.textContent = d.bestScore + ' / ' + total;
        attEl.textContent  = d.totalAttempts + '回挑戦';
      } else {
        bestEl.textContent = '—';
        attEl.textContent  = total + '問・未挑戦';
      }
    });
  }

  /* =====================================================
     初期化
  ===================================================== */
  function init() {
    // モード選択ボタン
    document.getElementById('btn-mode-19').addEventListener('click', function() {
      startQuiz('19');
    });
    document.getElementById('btn-mode-28').addEventListener('click', function() {
      startQuiz('28');
    });

    // 牌クリック
    document.getElementById('tile-a').addEventListener('click', function() {
      handleTileClick('A');
    });
    document.getElementById('tile-b').addEventListener('click', function() {
      handleTileClick('B');
    });

    // 次の問題
    document.getElementById('next-btn').addEventListener('click', nextQuestion);

    // 結果画面ボタン
    document.getElementById('btn-home').addEventListener('click', function() {
      renderHomeScores();
      showScreen('screen-home');
    });
    document.getElementById('btn-retry').addEventListener('click', function() {
      startQuiz(state.mode);
    });

    // ホームのスコアを初期表示 + ボタンに問題数を表示
    renderHomeScores();
    ['19', '28'].forEach(function(mode) {
      const tiles = TILES[mode] || [];
      const total = Math.floor(tiles.length * (tiles.length - 1) / 2);
      const el = document.getElementById('label-mode-' + mode);
      if (el) el.textContent = total + '問（全組み合わせ）';
    });
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
