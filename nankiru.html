      sortedTiles.forEach((code, ti) => {
        if (keepTsumo && ti === sortedTiles.length - 1) {
          const gap = document.createElement('div');
          gap.className = 'prob-list-tsumo-gap';
          handWrap.appendChild(gap);
        }
        const d = document.createElement('div');
        d.className = 'prob-list-tile';
        const img = document.createElement('img');
        img.src = 'shared/images_hai/' + code + '.png';
        img.alt = tileLabel(code);
        img.onerror = function() { this.style.display='none'; d.insertAdjacentText('beforeend', tileLabel(code)); };
        d.appendChild(img);
        handWrap.appendChild(d);
      });

      // 副露牌
      if (q.melds && q.melds.length) {
        const meldGap = document.createElement('div');
        meldGap.style.cssText = 'width:8px;flex-shrink:0';
        handWrap.appendChild(meldGap);
        q.melds.forEach(meld => {
          const group = document.createElement('div');
          group.style.cssText = 'display:flex;align-items:flex-end;gap:1px;background:var(--card);padding:2px 3px;border-radius:3px;flex-shrink:0';
          let tiles = meld.tiles, calledIdx = meld.calledIndex;
          if (meld.type === 'chi' && calledIdx !== 0) {
            tiles = [tiles[calledIdx], ...tiles.filter((_, i) => i !== calledIdx)];
            calledIdx = 0;
          }
          tiles.forEach((code, ti) => {
            const isCalled = ti === calledIdx;
            const isBack = meld.type === 'ankan' && (ti === 0 || ti === tiles.length - 1);
            const TW = 22, TH = 31;
            const slot = document.createElement('div');
            slot.style.cssText = isCalled
              ? 'width:' + TH + 'px;height:' + TH + 'px;position:relative;flex-shrink:0'
              : 'width:' + TW + 'px;height:' + TH + 'px;flex-shrink:0';
            const inner = document.createElement('div');
            inner.style.cssText = isCalled
              ? 'position:absolute;top:' + ((TH-TW)/2) + 'px;left:' + ((TH-TW)/2) + 'px;width:' + TW + 'px;height:' + TH + 'px;transform:rotate(270deg);background:#f5f0e8;border-radius:2px;overflow:hidden'
              : 'width:100%;height:100%;background:#f5f0e8;border-radius:2px;overflow:hidden';
            const img = document.createElement('img');
            img.src = 'shared/images_hai/' + (isBack ? 'back' : code) + '.png';
            img.alt = isBack ? '伏せ牌' : tileLabel(code);
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
            img.onerror = function() { this.style.display='none'; inner.insertAdjacentText('beforeend', tileLabel(code)); };
            inner.appendChild(img);
            slot.appendChild(inner);
            group.appendChild(slot);
          });
          handWrap.appendChild(group);
        });
      }

      item.appendChild(handWrap);

      // タグチップ
      if (q.tags && q.tags.length) {
        const tagsDiv = document.createElement('div');
        tagsDiv.className = 'prob-list-tags';
        sortTagsByCategory(q.tags).forEach(tag => {
          const chip = document.createElement('span');
          chip.className = 'card-tag' + (listActiveTagFilter === tag ? ' active-filter' : '');
          chip.textContent = tag;
          chip.dataset.tag = tag;
          chip.dataset.category = getTagCategory(tag);
          chip.title = 'このタグでフィルター';
          tagsDiv.appendChild(chip);
        });
        doraWrap.appendChild(tagsDiv);
      }

      frag.appendChild(item);
    });
    el.appendChild(frag);
  }
  renderListPagination(totalPages, displayProblems.length);
  showScreen('list');
}

function renderListPagination(totalPages, totalCount) {
  ['problem-list-pagination-top', 'problem-list-pagination'].forEach(id => {
    const wrap = document.getElementById(id);
    if (totalCount <= LIST_PAGE_SIZE) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }
    wrap.style.display = 'flex';
    wrap.className = 'list-pagination';
    wrap.innerHTML = '';

    const prev = document.createElement('button');
    prev.type = 'button';
    prev.className = 'btn-home-quiz';
    prev.textContent = '← 前へ';
    prev.disabled = listCurrentPage <= 1;
    prev.onclick = () => goToListPage(listCurrentPage - 1, id);

    const info = document.createElement('span');
    info.className = 'list-pagination-info';
    info.textContent = listCurrentPage + ' / ' + totalPages + ' ページ';

    const next = document.createElement('button');
    next.type = 'button';
    next.className = 'btn-home-quiz';
    next.textContent = '次へ →';
    next.disabled = listCurrentPage >= totalPages;
    next.onclick = () => goToListPage(listCurrentPage + 1, id);

    wrap.appendChild(prev);
    wrap.appendChild(info);
    wrap.appendChild(next);
  });
}

function goToListPage(p, sourceId) {
  listCurrentPage = p;
  showProblemList().then(() => {
    if (sourceId === 'problem-list-pagination') {
      // 下ページャー操作時は上ページャーへスクロールし、新ページの先頭から閲覧できるようにする
      const top = document.getElementById('problem-list-pagination-top');
      if (top) top.scrollIntoView({ block: 'start', behavior: 'smooth' });
    }
  });
}

function setListTagFilter(tag) {
  listActiveTagFilter = tag;
  listCurrentPage = 1;
  showProblemList();
}

// ===== QUIZ =====
async function startRandomQuiz() {
  if (!_authReady) { console.warn('認証初期化前のためランダム挑戦をスキップ'); return; }
  document.getElementById('btn-list').classList.remove('primary');
  document.getElementById('btn-random').classList.add('primary');
  const src = await loadProblems();
  if (!src.length) { alert('問題が登録されていません'); return; }
  st.problems = shuffle(src).slice(0, 20);
  st.mode = 'random';
  st.idx = 0; st.correct = 0; st.wrongs = [];
  showScreen('quiz');
  renderQ();
}

function startSingleQuiz(problem, orderedList) {
  const list = orderedList || [problem];
  const startIdx = list.findIndex(p => p === problem || p.id === problem.id);
  // 全件保持して st.idx で開始位置を示す。これにより末尾まで進んだ後に
  // st.idx=0 へ戻すとリスト先頭の問題から再開できる（ループ動作）
  st.problems = list.length ? list : [problem];
  st.mode = 'list';
  st.idx = startIdx >= 0 ? startIdx : 0;
  st.correct = 0; st.wrongs = [];
  showScreen('quiz');
  renderQ();
}

function renderQ() {
  const rawQ = st.problems[st.idx];
  const doMirror = !!rawQ.mirror && Math.random() < 0.5;
  const q = transformQuestion(rawQ, generateSuitMapping(), doMirror);
  const quizScreen = document.getElementById('screen-quiz');
  quizScreen.classList.remove('is-answered', 'is-meld-question');
  st.answered = false;
  st.riichiSelected = null;
  st.meldStep = 0;
  st.meldActionSelected = null;
  st.chiSelectedTiles = [];
  const isMeldQ = !!q.questionType;
  quizScreen.classList.toggle('is-meld-question', isMeldQ);

  // 副露がある場合はタイル幅を縮小して見切れを防ぐ
  document.documentElement.style.setProperty('--tile-w', calcTileWidth(q.hand, q.melds));

  const total = st.problems.length, cur = st.idx + 1;
  document.getElementById('q-progress').textContent = '問題 ' + cur + ' / ' + total;
  const scoreEl = document.getElementById('q-score');
  const progressBarEl = document.getElementById('q-progress-bar');
  if (st.mode === 'list') {
    scoreEl.style.display = 'none';
    progressBarEl.style.display = 'none';
  } else {
    scoreEl.style.display = '';
    scoreEl.textContent = st.correct + ' 正解';
    progressBarEl.style.display = '';
  }
  const quizBackBtn = document.getElementById('btn-quiz-back');
  if (st.mode === 'list') {
    quizBackBtn.textContent = '← 問題一覧へ戻る';
    quizBackBtn.onclick = () => {
      if (st.answered || confirm('問題を解くのを中断して問題一覧へ戻りますか？')) showProblemList();
    };
  } else {
    quizBackBtn.textContent = '← ホーム';
    quizBackBtn.onclick = confirmGoHome;
  }
  document.getElementById('q-fill').style.width     = ((cur - 1) / total * 100) + '%';

  // 局情報・ドラ・メモ
  const hasRound = !!q.round;
  const hasDora  = q.dora && q.dora.length > 0;
  const hasMemo  = !!q.memo;
  const sBar = document.getElementById('situation-bar');
  sBar.style.display = (hasRound || hasDora || hasMemo) ? '' : 'none';
  const memoEl = document.getElementById('q-memo');
  if (hasMemo) { renderCommentary(q.memo, memoEl); memoEl.style.display = ''; }
  else { memoEl.style.display = 'none'; }
  const roundText = [q.round, q.seat ? q.seat + '家' : '', q.turn ? q.turn + '巡目' : ''].filter(Boolean).join(' ');
  document.getElementById('q-round').textContent = roundText;
  const doraBlock = document.getElementById('dora-block');
  const doraEl    = document.getElementById('q-dora');
  doraEl.innerHTML = '';
  if (hasDora) {
    buildDoraStrip(q.dora, doraEl, false);
    doraBlock.style.display = '';
  } else {
    doraBlock.style.display = 'none';
  }

  // 副露牌エリア
  const meldsArea = document.getElementById('melds-area');
  meldsArea.innerHTML = '';
  const hasMelds = q.melds && q.melds.length > 0;
  meldsArea.style.display = hasMelds ? '' : 'none';
  if (hasMelds) {
    q.melds.forEach(meld => meldsArea.appendChild(makeMeldGroup(meld)));
  }

  // 手牌
  const handEl = document.getElementById('hand-tiles');
  handEl.innerHTML = ''; handEl.className = 'hand-tiles';
  const has14 = q.hand.length === 14;
  const keepTsumo = !isMeldQ && (has14 || hasMelds);
  const displayHand = sortedHand(q.hand, keepTsumo);
  _currentQ = q;
  _currentDisplayHand = displayHand;
  displayHand.forEach((code, i) => {
    // ツモ牌の前にスペーサーを挿入
    if (keepTsumo && i === displayHand.length - 1) {
      const spacer = document.createElement('div');
      spacer.className = 'tsumo-spacer';
      handEl.appendChild(spacer);
    }
    const slot = makeTile(code);
    slot.dataset.index = i;
    if (keepTsumo && i === displayHand.length - 1) {
      const lbl = document.createElement('span');
      lbl.className = 'tsumo-label';
      lbl.textContent = 'ツモ';
      slot.appendChild(lbl);
    }
    handEl.appendChild(slot);
  });

  // 鳴き/リーチ/ダマ選択オプションの設定
  const hasRiichiStep = !!q.riichiChoice;
  const rcRow = document.getElementById('riichi-choice-row');
  const mcRow = document.getElementById('meld-choice-row');
  const inRow = document.getElementById('incoming-tile-row');
  rcRow.classList.toggle('visible', hasRiichiStep && !isMeldQ);
  mcRow.classList.remove('visible');
  inRow.classList.remove('visible');
  if (isMeldQ) {
    renderMeldQuestion(q);
  } else if (hasRiichiStep) {
    handEl.classList.add('answered'); // リーチ/ダマ選択前は牌を選べない
    const rBtn = document.getElementById('riichi-btn-riichi');
    const dBtn = document.getElementById('riichi-btn-dama');
    rBtn.disabled = false; dBtn.disabled = false;
    rBtn.className = 'riichi-btn'; dBtn.className = 'riichi-btn';
    rBtn.onclick = () => onRiichiChoice('riichi', q);
    dBtn.onclick = () => onRiichiChoice('dama', q);
    document.getElementById('q-instruction').textContent = 'リーチしますか？';
  } else {
    document.getElementById('q-instruction').textContent = 'どの牌を切りますか？';
  }

  document.getElementById('feedback-area').style.display    = 'none';
  document.getElementById('btn-next').style.display         = 'none';
  document.getElementById('btn-retry-again').style.display  = 'none';
  document.getElementById('btn-go-to-list').style.display   = 'none';
  document.getElementById('q-instruction').style.display = isMeldQ ? 'none' : '';
}

function showFeedbackArea(ok, q) {
  document.getElementById('screen-quiz').classList.add('is-answered');
  const fa = document.getElementById('feedback-area');
  const fr = document.getElementById('feedback-result');
  fr.textContent = ok ? '正解！' : '不正解';
  fr.className   = 'feedback-result ' + (ok ? 'correct' : 'wrong');
  fa.className   = 'feedback-area '   + (ok ? 'correct' : 'wrong');
  const shantenEl = document.getElementById('feedback-shanten');
  const autoShanten = (Array.isArray(q.ukeireru) && q.ukeireru[0] && Object.prototype.hasOwnProperty.call(q.ukeireru[0], 'shantenAfter'))
    ? q.ukeireru[0].shantenAfter
    : null;
  const shantenValue = autoShanten != null ? autoShanten : q.shanten;
  if (shantenValue != null && shantenValue !== '') {
    const label = shantenValue === 0 ? 'テンパイ' : shantenValue + 'シャンテン';
    shantenEl.innerHTML = '<span class="shanten-badge">' + label + '</span>';
    shantenEl.style.display = '';
  } else {
    shantenEl.style.display = 'none';
  }
  renderCommentary(q.commentary || '', document.getElementById('feedback-commentary'));
  const ukRow = document.getElementById('feedback-ukeireru');
  renderUkeireru(q.ukeireru || [], ukRow);
  const ukDetails = document.getElementById('feedback-ukeireru-details');
  const hasUkeireru = !!(q.ukeireru && q.ukeireru.length);
  if (ukDetails) {
    ukDetails.open = false;
    ukDetails.style.display = hasUkeireru ? '' : 'none';
    if (!ukDetails.dataset.bound) {
      ukDetails.addEventListener('toggle', () => {
        ukRow.style.display = ukDetails.open ? '' : 'none';
      });
      ukDetails.dataset.bound = '1';
    }
  }
  ukRow.style.display = 'none';
  const srcEl = document.getElementById('feedback-source');
  const srcText = [q.source, q.sourceMemo].filter(Boolean).join(' ');
  if (srcText) { srcEl.textContent = '出典: ' + srcText; srcEl.style.display = ''; }
  else { srcEl.style.display = 'none'; }
  const tagsEl = document.getElementById('feedback-tags');
  if (ok && Array.isArray(q.tags) && q.tags.length) {
    tagsEl.innerHTML = '';
    sortTagsByCategory(q.tags).forEach(tag => {
      const chip = document.createElement('span');
      chip.className = 'card-tag';
      chip.textContent = tag;
      chip.dataset.category = getTagCategory(tag);
      tagsEl.appendChild(chip);
    });
    tagsEl.style.display = '';
  } else {
    tagsEl.style.display = 'none';
  }
  fa.style.display = '';
  document.getElementById('q-instruction').style.display = 'none';
  if (st.mode !== 'list') {
    document.getElementById('q-score').textContent = st.correct + ' 正解';
  }
  const btn = document.getElementById('btn-next');
  const retryAgainBtn = document.getElementById('btn-retry-again');
  const goToListBtn = document.getElementById('btn-go-to-list');
  btn.textContent = (st.idx + 1 < st.problems.length || st.mode === 'list') ? '次の問題' : '結果を見る';
  btn.style.display = '';
  btn.className = 'btn-next';
  btn.onclick = () => nextQ();
  retryAgainBtn.style.display = '';
  retryAgainBtn.onclick = () => { retryCurrentQ(); };
  goToListBtn.style.display = '';
  goToListBtn.onclick = () => { showProblemList(); };
}

function onTileClick(idx, code, q) {
  if (st.answered) return;
  st.answered = true;

  // 通常問題なのに正解牌が空配列 = データ破損の予兆。判定は全て不正解になるため、原因究明のために警告する。
  if (!q.questionType && getCorrectAnswers(q).length === 0) {
    console.warn('[nankiru] correctAnswer が空の通常問題', { id: q.id });
  }

  const tileOk = isCorrectAnswer(q, code);
  const riichiOk = !q.riichiChoice || st.riichiSelected === q.riichiChoice;
  const ok = tileOk && riichiOk;
  if (ok) st.correct++;
  else st.wrongs.push({ question: q, selectedCode: code, selectedRiichi: st.riichiSelected || null });

  // リーチ/ダマボタンの正誤を表示
  if (q.riichiChoice) {
    const rBtn = document.getElementById('riichi-btn-riichi');
    const dBtn = document.getElementById('riichi-btn-dama');
    const correctBtn = q.riichiChoice === 'riichi' ? rBtn : dBtn;
    correctBtn.classList.add('correct');
    if (!riichiOk) {
      const selectedBtn = st.riichiSelected === 'riichi' ? rBtn : dBtn;
      selectedBtn.classList.remove('selected');
      selectedBtn.classList.add('wrong');
    }
  }

  const handEl = document.getElementById('hand-tiles');
  handEl.classList.add('answered');
  const answerSet = getCorrectAnswers(q);
  handEl.querySelectorAll('.tile-slot').forEach(slot => {
    const si = +slot.dataset.index, sc = slot.dataset.code;
    if (si === idx)                    slot.classList.add(tileOk ? 'correct' : 'wrong');
    if (!tileOk && answerSet.includes(sc)) slot.classList.add('correct');
  });

  showFeedbackArea(ok, q);
}

function onRiichiChoice(choice, q) {
  // ボタンをロックしてステップ1完了を視覚表示
  const rBtn = document.getElementById('riichi-btn-riichi');
  const dBtn = document.getElementById('riichi-btn-dama');
  rBtn.disabled = true; dBtn.disabled = true;
  const selectedBtn = choice === 'riichi' ? rBtn : dBtn;
  selectedBtn.classList.add('selected');

  // リーチ/ダマ選択を state に記録
  st.riichiSelected = choice;

  // ステップ2: 牌選択を有効化
  const handEl = document.getElementById('hand-tiles');
  handEl.classList.remove('answered');
  document.getElementById('q-instruction').textContent = 'どの牌を切りますか？';
}

// ===== チー/ポン/カン 問題 =====
function renderMeldQuestion(q) {
  const ACTION_LABELS = { chi: 'チー', pon: 'ポン', kan: 'カン', skip: 'スルー' };
  const handEl = document.getElementById('hand-tiles');
  handEl.classList.add('answered');

  const inRow = document.getElementById('incoming-tile-row');
  const inDisplay = document.getElementById('incoming-tile-display');
  inDisplay.innerHTML = '';
  const inTile = makeTile(q.incomingTile, 'incoming');
  inTile.style.cursor = 'default';
  inDisplay.appendChild(inTile);
  document.getElementById('incoming-label').textContent = q.incomingFrom || '来牌';
  inRow.classList.add('visible');

  const mcRow = document.getElementById('meld-choice-row');
  mcRow.innerHTML = '';
  (q.availableActions || []).forEach(action => {
    const btn = document.createElement('button');
    btn.className = 'meld-btn';
    btn.dataset.action = action;
    btn.textContent = ACTION_LABELS[action] || action;
    btn.onclick = () => onMeldActionClick(action, q);
    mcRow.appendChild(btn);
  });
  mcRow.classList.add('visible');

  document.getElementById('q-instruction').style.display = 'none';
}

function onMeldActionClick(action, q) {
  st.meldActionSelected = action;
  document.getElementById('meld-choice-row').querySelectorAll('.meld-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.action === action) btn.classList.add('selected');
  });

  if (action === 'skip' || action === 'kan') {
    evaluateMeldAnswer(q, undefined, undefined);
  } else if (action === 'pon') {
    st.meldStep = 2;
    const handEl = document.getElementById('hand-tiles');
    handEl.classList.remove('answered');
    handEl.querySelectorAll('.tile-slot').forEach(slot => {
      slot.onclick = () => onMeldDiscardClick(+slot.dataset.index, slot.dataset.code, q);
    });
    const instrElPon = document.getElementById('q-instruction');
    instrElPon.style.display = '';
    instrElPon.textContent = 'どの牌を切りますか？';
  } else if (action === 'chi') {
    st.meldStep = 1;
    st.chiSelectedTiles = [];
    enableHandForChiSelect(q);
    const instrElChi0 = document.getElementById('q-instruction');
    instrElChi0.style.display = '';
    instrElChi0.textContent = 'どの牌で鳴きますか？';
  }
}

function enableHandForChiSelect(q) {
  const handEl = document.getElementById('hand-tiles');
  handEl.classList.remove('answered');
  handEl.querySelectorAll('.tile-slot').forEach(slot => {
    slot.onclick = () => onChiTileClick(+slot.dataset.index, slot.dataset.code, q);
  });
}

function onChiTileClick(idx, code, q) {
  if (st.meldStep !== 1) return;
  const handEl = document.getElementById('hand-tiles');
  const slot = handEl.querySelector('[data-index="' + idx + '"]');

  const existingIdx = st.chiSelectedTiles.findIndex(t => t.idx === idx);
  if (existingIdx !== -1) {
    st.chiSelectedTiles.splice(existingIdx, 1);
    slot.classList.remove('chi-selected');
    return;
  }
  if (st.chiSelectedTiles.length >= 2) return;

  st.chiSelectedTiles.push({ idx, code });
  slot.classList.add('chi-selected');

  if (st.chiSelectedTiles.length === 2) {
    st.meldStep = 2;
    handEl.querySelectorAll('.tile-slot').forEach(s => {
      const si = +s.dataset.index;
      if (st.chiSelectedTiles.some(t => t.idx === si)) {
        s.onclick = () => {
          const pos = st.chiSelectedTiles.findIndex(t => t.idx === si);
          if (pos !== -1) st.chiSelectedTiles.splice(pos, 1);
          s.classList.remove('chi-selected');
          st.meldStep = 1;
          enableHandForChiSelect(q);
          document.getElementById('q-instruction').style.display = 'none';
        };
      } else {
        s.onclick = () => onMeldDiscardClick(si, s.dataset.code, q);
      }
    });
    const instrElChi = document.getElementById('q-instruction');
    instrElChi.style.display = '';
    instrElChi.textContent = 'どの牌を切りますか？';
  }
}

function onMeldDiscardClick(idx, code, q) {
  if (st.meldStep !== 2 || st.answered) return;
  st.answered = true;
  evaluateMeldAnswer(q, idx, code);
}

function evaluateMeldAnswer(q, discardIdx, discardCode) {
  st.answered = true;
  const actionOk = st.meldActionSelected === q.correctAction;

  let chiPairOk = true;
  if (q.correctAction === 'chi' && actionOk) {
    const selected = st.chiSelectedTiles.map(t => t.code).sort().join(',');
    const correct  = [...(q.correctChiPair || [])].sort().join(',');
    chiPairOk = selected === correct;
  }

  let discardOk = true;
  if (q.correctAction === 'chi' || q.correctAction === 'pon') {
    discardOk = discardCode === q.correctDiscard;
  }

  const ok = actionOk && chiPairOk && discardOk;
  if (ok) st.correct++;
  else st.wrongs.push({
    question: q,
    selectedAction: st.meldActionSelected,
    selectedChiPair: st.chiSelectedTiles.map(t => t.code),
    selectedDiscard: discardCode || null
  });

  // アクションボタンのフィードバック
  document.getElementById('meld-choice-row').querySelectorAll('.meld-btn').forEach(btn => {
    const a = btn.dataset.action;
    if (a === q.correctAction) btn.classList.add('correct');
    if (a === st.meldActionSelected && a !== q.correctAction) {
      btn.classList.remove('selected');
      btn.classList.add('wrong');
    }
  });

  // 手牌タイルのフィードバック
  const handEl = document.getElementById('hand-tiles');
  handEl.classList.add('answered');
  if (discardIdx !== undefined) {
    handEl.querySelectorAll('.tile-slot').forEach(slot => {
      const si = +slot.dataset.index;
      const sc = slot.dataset.code;
      if (si === discardIdx) slot.classList.add(discardOk ? 'correct' : 'wrong');
      else if (!discardOk && sc === q.correctDiscard) slot.classList.add('correct');
    });
  }
  st.chiSelectedTiles.forEach(({ idx: ci }) => {
    const slot = handEl.querySelector('[data-index="' + ci + '"]');
    if (slot) slot.classList.add((chiPairOk && actionOk) ? 'correct' : 'wrong');
  });

  showFeedbackArea(ok, q);
}

function renderMeldReviewCard(card, q, entry) {
  const ACTION_LABELS = { chi: 'チー', pon: 'ポン', kan: 'カン', skip: 'スルー' };
  const { selectedAction, selectedChiPair, selectedDiscard } = entry;

  // 局情報・ドラ
  if (q.round || q.seat || q.turn || (q.dora && q.dora.length)) {
    const meta = document.createElement('div');
    meta.className = 'review-meta';
    if (q.round || q.seat || q.turn) {
      const rnd = document.createElement('span');
      rnd.className = 'review-meta-round';
      rnd.textContent = [q.round, q.seat ? q.seat + '家' : '', q.turn ? q.turn + '巡目' : ''].filter(Boolean).join(' ');
      meta.appendChild(rnd);
    }
    if (q.dora && q.dora.length) {
      const dw = document.createElement('div'); dw.className = 'review-meta-dora';
      buildDoraStrip(q.dora, dw, true);
      meta.appendChild(dw);
    }
    card.appendChild(meta);
  }

  // 来牌
  const incomingRow = document.createElement('div');
  incomingRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';
  const incomingLbl = document.createElement('span');
  incomingLbl.style.cssText = 'font-size:0.8rem;color:var(--text-dim);flex-shrink:0;';
  incomingLbl.textContent = (q.incomingFrom || '来牌') + ':';
  incomingRow.appendChild(incomingLbl);
  const inTileEl = makeTile(q.incomingTile, '', true);
  inTileEl.style.cursor = 'default';
  incomingRow.appendChild(inTileEl);
  card.appendChild(incomingRow);

  // 手牌 + 副露
  const handRow = document.createElement('div');
  handRow.style.cssText = 'display:flex;align-items:flex-end;gap:0;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;';
  const handDiv = document.createElement('div');
  handDiv.style.cssText = 'display:flex;gap:0;flex-shrink:0;';
  let discardMarked = false;
  sortedHand(q.hand, q.hand.length === 14).forEach(c => {
    let extraClass = '';
    if (!discardMarked && selectedDiscard && c === selectedDiscard &&
        (selectedAction === 'chi' || selectedAction === 'pon')) {
      discardMarked = true;
      extraClass = selectedDiscard === q.correctDiscard ? 'correct' : 'wrong';
    }
    if (!extraClass && q.correctDiscard && c === q.correctDiscard &&
        (q.correctAction === 'chi' || q.correctAction === 'pon')) {
      extraClass = 'correct';
    }
    handDiv.appendChild(makeTile(c, extraClass, true));
  });
  handRow.appendChild(handDiv);
  if (q.melds && q.melds.length) {
    const mr = document.createElement('div');
    mr.style.cssText = 'display:flex;gap:6px;align-items:flex-end;flex-shrink:0;';
    q.melds.forEach(meld => mr.appendChild(makeMeldGroupSmall(meld)));
    handRow.appendChild(mr);
  }
  card.appendChild(handRow);

  // アクション選択結果
  const choiceRow = document.createElement('div');
  choiceRow.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap;';
  (q.availableActions || []).forEach(a => {
    const btn = document.createElement('span');
    const isSelected = a === selectedAction, isCorrect = a === q.correctAction;
    btn.style.cssText = 'padding:5px 14px;border-radius:8px;font-weight:700;font-size:0.88rem;border:2px solid ' +
      (isCorrect ? 'var(--correct)' : isSelected ? 'var(--wrong)' : 'var(--text-dim)') + ';color:' +
      (isCorrect ? 'var(--correct)' : isSelected ? 'var(--wrong)' : 'var(--text-dim)') + ';background:' +
      (isCorrect ? 'rgba(49,183,122,0.12)' : isSelected ? 'rgba(201,75,75,0.12)' : 'transparent');
    btn.textContent = ACTION_LABELS[a] || a;
    choiceRow.appendChild(btn);
  });
  card.appendChild(choiceRow);

  // 正解情報
  const info = document.createElement('div');
  const ansLine = document.createElement('div');
  ansLine.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px;';
  const ansLbl = document.createElement('span');
  ansLbl.className = 'review-answer-label';
  ansLbl.textContent = '正解: ' + (ACTION_LABELS[q.correctAction] || q.correctAction);
  ansLine.appendChild(ansLbl);
  if (q.correctAction === 'chi' && q.correctChiPair) {
    const pLbl = document.createElement('span');
    pLbl.style.cssText = 'font-size:0.8rem;color:var(--text-dim);align-self:center;';
    pLbl.textContent = '鳴く:';
    ansLine.appendChild(pLbl);
    q.correctChiPair.forEach(c => {
      const t = makeTile(c, 'correct', true); t.style.cursor = 'default';
      ansLine.appendChild(t);
    });
  }
  if (q.correctDiscard && (q.correctAction === 'chi' || q.correctAction === 'pon')) {
    const dLbl = document.createElement('span');
    dLbl.style.cssText = 'font-size:0.8rem;color:var(--text-dim);align-self:center;';
    dLbl.textContent = '打:';
    ansLine.appendChild(dLbl);
    const dt = makeTile(q.correctDiscard, 'correct', true); dt.style.cursor = 'default';
    ansLine.appendChild(dt);
  }
  info.appendChild(ansLine);
  const cmt = document.createElement('p');
  cmt.className = 'review-commentary';
  renderCommentary(q.commentary || '', cmt);
  info.appendChild(cmt);
  const reviewSrcText = [q.source, q.sourceMemo].filter(Boolean).join(' ');
  if (reviewSrcText) {
    const src = document.createElement('p');
    src.className = 'feedback-source'; src.style.marginTop = '8px';
    src.textContent = '出典: ' + reviewSrcText;
    info.appendChild(src);
  }
  card.appendChild(info);
}

async function nextQ() {
  st.idx++;
  if (st.idx < st.problems.length) {
    renderQ();
  } else if (st.mode === 'list') {
    // 問題一覧モードでは最後の問題の次は1問目に戻ってループする
    st.idx = 0;
    st.correct = 0;
    st.wrongs = [];
    st.answered = false;
    st.riichiSelected = null;
    st.meldStep = 0;
    st.meldActionSelected = null;
    st.chiSelectedTiles = [];
    renderQ();
  } else {
    await showResult();
  }
}

function retryCurrentQ() {
  st.answered = false;
  st.riichiSelected = null;
  st.meldStep = 0;
  st.meldActionSelected = null;
  st.chiSelectedTiles = [];
  renderQ();
}

function retryAgain() {
  st.idx = 0;
  st.correct = 0;
  st.wrongs = [];
  st.answered = false;
  st.riichiSelected = null;
  st.meldStep = 0;
  st.meldActionSelected = null;
  st.chiSelectedTiles = [];
  showScreen('quiz');
  renderQ();
}

// ===== RESULT =====
async function showResult() {
  const total = st.problems.length, correct = st.correct;
  document.getElementById('r-score').textContent = correct + ' / ' + total;
  const retryBtn = document.getElementById('btn-retry');
  const retryAgainResultBtn = document.getElementById('btn-retry-again-result');
  retryAgainResultBtn.className = 'btn-ghost';
  retryAgainResultBtn.onclick = () => { retryAgain(); };
  if (st.mode === 'list') {
    retryBtn.textContent = '問題一覧に戻る';
    retryBtn.className = 'btn-ghost';
    retryBtn.onclick = () => { showProblemList(); };
  } else {
    retryBtn.textContent = 'もう一度';
    retryBtn.className = 'btn-primary';
    retryBtn.onclick = startRandomQuiz;
  }

  const revEl = document.getElementById('r-review'), revHdr = document.getElementById('r-review-hdr');
  revEl.innerHTML = '';

  if (!st.wrongs.length) {
    revHdr.style.display = 'none';
    revEl.innerHTML = '<p style="text-align:center;color:var(--correct);font-size:1.05rem;padding:20px 0">全問正解！おめでとう！</p>';
  } else {
    revHdr.style.display = '';
    revHdr.textContent   = '間違えた問題 (' + st.wrongs.length + '問)';

    st.wrongs.forEach(entry => {
      const q = entry.question;
      const card = document.createElement('div');
      card.className = 'review-card';

      if (q.questionType) {
        renderMeldReviewCard(card, q, entry);
        revEl.appendChild(card);
        return;
      }
      const { selectedCode, selectedRiichi } = entry;

      // 局情報・ドラ
      if (q.round || q.seat || q.turn || (q.dora && q.dora.length)) {
        const meta = document.createElement('div');
        meta.className = 'review-meta';
        if (q.round || q.seat || q.turn) { const rnd = document.createElement('span'); rnd.className = 'review-meta-round'; rnd.textContent = [q.round, q.seat ? q.seat + '家' : '', q.turn ? q.turn + '巡目' : ''].filter(Boolean).join(' '); meta.appendChild(rnd); }
        if (q.dora && q.dora.length) {
          const dw = document.createElement('div'); dw.className = 'review-meta-dora';
          buildDoraStrip(q.dora, dw, true);
          meta.appendChild(dw);
        }
        card.appendChild(meta);
      }

      // 手牌 + 副露（同一行：手牌左・副露右）
      const handRow = document.createElement('div');
      handRow.style.cssText = 'display:flex;align-items:flex-end;gap:0;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;';

      const handDiv = document.createElement('div');
      handDiv.style.cssText = 'display:flex;gap:0;flex-shrink:0;';
      const reviewAnswers = getCorrectAnswers(q);
      sortedHand(q.hand, q.hand.length === 14).forEach(c => {
        const isOk = reviewAnswers.includes(c);
        const isNg = c === selectedCode && !isOk;
        handDiv.appendChild(makeTile(c, (isOk ? 'correct' : '') + (isNg ? ' wrong' : ''), true));
      });
      handRow.appendChild(handDiv);

      if (q.melds && q.melds.length) {
        const mr = document.createElement('div');
        mr.style.cssText = 'display:flex;gap:6px;align-items:flex-end;flex-shrink:0;';
        q.melds.forEach(meld => mr.appendChild(makeMeldGroupSmall(meld)));
        handRow.appendChild(mr);
      }

      card.appendChild(handRow);

      // リーチ/ダマ選択あり問題：選択結果を表示
      if (q.riichiChoice) {
        const choiceRow = document.createElement('div');
        choiceRow.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;align-items:center;';
        ['riichi', 'dama'].forEach(c => {
          const btn = document.createElement('span');
          const isSelected = c === selectedRiichi;
          const isCorrect  = c === q.riichiChoice;
          btn.style.cssText = 'padding:5px 18px;border-radius:8px;font-weight:700;font-size:0.88rem;border:2px solid ' +
            (isCorrect ? 'var(--correct)' : isSelected ? 'var(--wrong)' : 'var(--text-dim)') + ';color:' +
            (isCorrect ? 'var(--correct)' : isSelected ? 'var(--wrong)' : 'var(--text-dim)') + ';background:' +
            (isCorrect ? 'rgba(49,183,122,0.12)' : isSelected ? 'rgba(201,75,75,0.12)' : 'transparent');
          btn.textContent = c === 'riichi' ? 'リーチ' : 'ダマ';
          choiceRow.appendChild(btn);
        });
        card.appendChild(choiceRow);
      }

      // 正解・解説
      const info = document.createElement('div');
      const cmt = document.createElement('p'); cmt.className = 'review-commentary'; renderCommentary(q.commentary || '', cmt);
      info.appendChild(cmt);
      const infoRow = document.createElement('div');
      infoRow.className = 'feedback-info-row';
      let urow = null;
      if (q.ukeireru && q.ukeireru.length) {
        const udet = document.createElement('details');
        udet.className = 'ukeireru-details';
        const usum = document.createElement('summary');
        usum.className = 'ukeireru-summary';
        usum.textContent = '受け入れ牌を表示';
        udet.appendChild(usum);
        urow = document.createElement('div');
        urow.className = 'ukeireru-row';
        renderUkeireru(q.ukeireru, urow);
        urow.style.display = 'none';
        udet.addEventListener('toggle', () => {
          urow.style.display = udet.open ? '' : 'none';
        });
        infoRow.appendChild(udet);
      }
      if (q.shanten != null && q.shanten !== '') {
        const sb = document.createElement('span'); sb.className = 'shanten-badge';
        sb.textContent = q.shanten === 0 ? 'テンパイ' : q.shanten + 'シャンテン';
        infoRow.appendChild(sb);
      }
      if (infoRow.childNodes.length) info.appendChild(infoRow);
      if (urow) info.appendChild(urow);
      const summarySrcText = [q.source, q.sourceMemo].filter(Boolean).join(' ');
      if (summarySrcText) {
        const src = document.createElement('p');
        src.className = 'feedback-source';
        src.style.marginTop = '8px';
        src.textContent = '出典: ' + summarySrcText;
        info.appendChild(src);
      }
      card.appendChild(info);
      revEl.appendChild(card);
    });
  }

  showScreen('result');
}

// ===== INIT =====
// タイルクリックのイベント委譲（renderQ呼び出しごとにリスナーを付け直さない）
document.getElementById('hand-tiles').addEventListener('click', e => {
  if (!_currentQ || !!_currentQ.questionType) return;
  const slot = e.target.closest('.tile-slot');
  if (!slot) return;
  const idx = parseInt(slot.dataset.index, 10);
  if (isNaN(idx)) return;
  onTileClick(idx, _currentDisplayHand[idx], _currentQ);
});

showScreen('home');
// onAuthStateChanged が initHome() を呼ぶ。CDNブロック時のフォールバック:
if (typeof firebase === 'undefined') initHome();

// 初期描画完了後に preload クラスを外す（transition/animation の発火を再許可）
window.addEventListener('load', () => {
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.body.classList.remove('preload');
  }));
});
</script>
