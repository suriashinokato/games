<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麻雀 手牌トレーニング</title>
  <meta name="theme-color" content="#090a0b">
  <meta name="apple-mobile-web-app-title" content="手牌トレ">
  <link rel="icon" type="image/svg+xml" href="shared/brand/tehai-training-logo.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="shared/brand/tehai-training-logo-180.png">
  <link rel="manifest" href="tehai-training.webmanifest">
  <!-- Firebase compat SDK (Google ログイン + Firestore 同期) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    /* ===== カスタムプロパティ (墨色・真鍮・翡翠で上質感を出す) ===== */
    :root {
      --bg-page:       #17191b;
      --bg-panel:      rgba(255,255,255,0.055);
      --bg-card:       #fbfaf6;
      --bg-commentary: #f1eee6;
      --border-tile:   #d6cdbb;
      --border-strong: #b99a4e;
      --accent-primary:        #0f7a6e;
      --accent-primary-strong: #0a4d46;
      --accent-primary-soft:   rgba(15,122,110,0.12);
      --accent-gold:           #b99a4e;
      --accent-gold-soft:      rgba(185,154,78,0.18);
      --accent-indigo:         #4f5fa8;
      --accent-indigo-soft:    rgba(79,95,168,0.14);
      --accent-brass:          #a56f2d;
      --accent-brass-soft:     rgba(165,111,45,0.16);
      --accent-success:        #138064;
      --accent-success-bg:     #dff2ea;
      --accent-error:          #b33b4b;
      --accent-error-bg:       #f7e2e5;
      --text-main:     #202327;
      --text-sub:      #646052;
      --text-on-dark:  #f8f3e7;
      --shadow-card:   0 18px 44px rgba(0,0,0,0.24), 0 1px 0 rgba(255,255,255,0.55) inset;
      --shadow-tile:   0 4px 10px rgba(20,18,13,0.22);
      /* 14枚を必ず1行に収めるため、ビューポート幅に応じて自動縮小する
         (画面側余白16px×2 + .hand内側余白12px×2 = 56px を差し引いて14分割。牌間gapは0) */
      --tile-w:        min(48px, calc((100vw - 56px) / 14));
      --tile-h:        calc(var(--tile-w) * 1.4);
      --radius:        8px;
      --font:          'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', system-ui, sans-serif;
    }

    /* ===== リセット・基盤 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background:
        radial-gradient(circle at 50% -18%, rgba(185,154,78,0.24), transparent 34rem),
        linear-gradient(145deg, #111315 0%, #202226 42%, #16181a 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.72), transparent 72%);
    }

    button, input, select { font-family: inherit; }
    button,
    .tile.clickable,
    .palette-tile {
      touch-action: manipulation;
    }

    *:focus { outline: none; }
    *:focus-visible {
      outline: 2px solid var(--accent-gold);
      outline-offset: 3px;
    }

    /* ===== ヘッダー ===== */
    header {
      text-align: center;
      margin-bottom: 26px;
      color: var(--text-on-dark);
    }
    header h1 {
      font-size: clamp(1.45rem, 4vw, 2rem);
      letter-spacing: 0.12em;
      font-weight: 800;
      text-shadow: 0 6px 24px rgba(0,0,0,0.42);
    }
    header p {
      font-size: 0.9rem;
      color: rgba(248,243,231,0.72);
      margin-top: 8px;
      letter-spacing: 0.04em;
    }

    /* ===== 画面切替 ===== */
    [data-screen] { display: none; width: 100%; max-width: 760px; }
    [data-screen].active { display: block; }

    /* ===== ホーム画面 ===== */
    .mode-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }
    .mode-card {
      position: relative;
      overflow: hidden;
      --mode-accent: var(--accent-primary);
      --mode-accent-soft: var(--accent-primary-soft);
      --mode-border: rgba(185,154,78,0.44);
      background:
        radial-gradient(circle at 94% 16%, var(--mode-accent-soft), transparent 8.5rem),
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(244,240,230,0.96)),
        var(--bg-card);
      border: 1px solid var(--mode-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 19px 20px 19px 22px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: inherit;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }
    .mode-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--mode-accent);
    }
    .mode-card::after {
      content: "";
      position: absolute;
      top: 16px;
      right: 18px;
      width: 42px;
      height: 42px;
      border: 1px solid var(--mode-border);
      border-radius: 50%;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.42), transparent),
        var(--mode-accent-soft);
      opacity: 0.8;
      pointer-events: none;
    }
    .mode-card:hover {
      transform: translateY(-2px);
      border-color: var(--mode-accent);
      box-shadow: 0 22px 48px rgba(0,0,0,0.30), 0 0 0 1px var(--mode-accent-soft);
    }
    .mode-card[data-start-mode="shanten"] {
      --mode-accent: var(--accent-indigo);
      --mode-accent-soft: var(--accent-indigo-soft);
      --mode-border: rgba(79,95,168,0.34);
    }
    .mode-card[data-start-mode="ukeire"] {
      --mode-accent: var(--accent-primary);
      --mode-accent-soft: var(--accent-primary-soft);
      --mode-border: rgba(15,122,110,0.34);
    }
    .mode-card[data-start-mode="discard"] {
      --mode-accent: var(--accent-brass);
      --mode-accent-soft: var(--accent-brass-soft);
      --mode-border: rgba(165,111,45,0.36);
    }
    .mode-card[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .mode-card h2 {
      position: relative;
      z-index: 1;
      font-size: 1.08rem;
      margin-bottom: 6px;
      color: var(--text-main);
      letter-spacing: 0.04em;
    }
    .mode-card p {
      position: relative;
      z-index: 1;
      font-size: 0.88rem;
      color: var(--text-sub);
      line-height: 1.65;
    }
    .mode-card .badge {
      display: inline-block;
      font-size: 0.72rem;
      background: var(--accent-primary);
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ===== クイズ画面 ===== */
    .quiz-progress {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: rgba(248,243,231,0.78);
      margin-bottom: 12px;
      letter-spacing: 0.03em;
    }
    .hand {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.97), rgba(241,236,226,0.97)),
        var(--bg-card);
      border: 1px solid rgba(185,154,78,0.40);
      border-radius: var(--radius);
      padding: 16px 12px;
      display: flex;
      flex-wrap: nowrap;        /* スマホでも1行 (--tile-w が自動縮小) */
      gap: 0;
      justify-content: center;
      box-shadow: var(--shadow-card);
      margin-bottom: 18px;
    }
    .tile {
      width: var(--tile-w);
      height: var(--tile-h);
      object-fit: contain;
      border: 1px solid #d8d0c2;
      border-radius: 4px;
      background: white;
      box-shadow: var(--shadow-tile);
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }
    .tile.clickable { cursor: pointer; }
    .tile.clickable:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(20,18,13,0.30);
    }
    .tile.selected {
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 3px var(--accent-gold-soft), var(--shadow-tile);
    }

    .prompt {
      font-size: 1.08rem;
      text-align: center;
      margin: 14px 0 18px;
      color: var(--text-on-dark);
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .answer-area {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 18px;
    }
    .answer-area .palette { margin-bottom: 0; }
    .choice-btn {
      flex: 1 1 0;
      min-width: 130px;
      min-height: 56px;
      padding: 12px 18px;
      font-size: 1rem;
      font-family: inherit;
      white-space: nowrap;
      background: linear-gradient(180deg, #fffdf8, #f2ede3);
      border: 1px solid rgba(185,154,78,0.46);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text-main);
      box-shadow: var(--shadow-card);
      font-weight: 700;
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease;
    }
    .choice-btn:hover:not([disabled]) {
      transform: translateY(-2px);
      background: linear-gradient(180deg, #fffdf8, #eaf5f2);
      border-color: var(--accent-primary);
      box-shadow: 0 18px 36px rgba(0,0,0,0.26);
    }
    .choice-btn[disabled] {
      cursor: default;
      opacity: 0.7;
    }
    .choice-btn.correct-choice {
      background: var(--accent-success-bg);
      border-color: var(--accent-success);
      color: var(--accent-success);
      font-weight: 600;
    }
    .choice-btn.wrong-choice {
      background: var(--accent-error-bg);
      border-color: var(--accent-error);
      color: var(--accent-error);
    }

    .explanation {
      background: linear-gradient(180deg, #fbfaf6, var(--bg-commentary));
      border: 1px solid rgba(185,154,78,0.34);
      border-left: 4px solid var(--accent-gold);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }
    .explanation p + p { margin-top: 4px; }
    .explanation.correct { border-left-color: var(--accent-success); }
    .explanation.wrong { border-left-color: var(--accent-error); }
    .explanation .result-heading {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(185,154,78,0.28);
    }
    /* 解説本文を伴わない (シャンテン判定モード) ときは区切り線・余白を消す */
    .explanation .result-heading:only-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .explanation.correct .result-heading { color: var(--accent-success); }
    .explanation.wrong .result-heading { color: var(--accent-error); }
    .result-heading .result-detail {
      margin-left: 0.6em;
      font-size: 0.85em;
      font-weight: 700;
      color: #000;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .secondary-btn, .primary-btn {
      flex: 1;
      padding: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid rgba(185,154,78,0.44);
      box-shadow: var(--shadow-card);
      font-weight: 700;
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease;
    }
    .primary-btn {
      background: linear-gradient(180deg, #127c70, var(--accent-primary-strong));
      color: white;
      border-color: rgba(255,255,255,0.16);
      font-weight: 600;
    }
    .primary-btn:hover {
      background: linear-gradient(180deg, #168f82, #0b5a51);
      border-color: var(--accent-gold);
      transform: translateY(-1px);
    }
    .secondary-btn {
      background: linear-gradient(180deg, #fffdf8, #f2ede3);
      color: var(--text-main);
    }
    .secondary-btn:hover {
      border-color: var(--accent-gold);
      transform: translateY(-1px);
    }
    #home-btn,
    [data-action="back-home"] {
      background: rgba(255,255,255,0.055);
      border-color: rgba(248,243,231,0.22);
      box-shadow: none;
      color: rgba(248,243,231,0.72);
      font-weight: 600;
    }
    #home-btn:hover,
    [data-action="back-home"]:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(185,154,78,0.42);
      color: var(--text-on-dark);
      transform: translateY(-1px);
    }
    .hidden { display: none !important; }

    /* ===== 結果画面 ===== */
    .result-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(241,236,226,0.97));
      border: 1px solid rgba(185,154,78,0.40);
      border-radius: var(--radius);
      padding: 36px 24px 30px;
      text-align: center;
      box-shadow: var(--shadow-card);
      margin-bottom: 18px;
    }
    .result-label {
      color: var(--text-sub);
      letter-spacing: 0.06em;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    .result-score {
      font-size: 3.2rem;
      font-weight: 800;
      color: var(--accent-primary);
      line-height: 1.05;
    }
    .result-message {
      margin-top: 14px;
      color: var(--text-main);
      font-weight: 600;
    }
    .result-message.perfect { color: var(--accent-success); }

    /* ===== mode1: 牌パレット ===== */
    .palette {
      background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(241,236,226,0.97));
      border: 1px solid rgba(185,154,78,0.36);
      border-radius: var(--radius);
      padding: 12px 10px;
      box-shadow: var(--shadow-card);
      margin-bottom: 12px;
    }
    .palette-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      justify-content: center;
      margin-bottom: 4px;
    }
    .palette-row:last-child { margin-bottom: 0; }
    .palette-tile {
      width: 40px;
      height: 56px;
      padding: 0;
      border: 2px solid #d8d0c2;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      transition: transform 0.06s ease, box-shadow 0.12s ease;
    }
    .palette-tile img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
    /* 真のホバーが効くデバイス (マウス) のみホバー枠を表示。
       タッチ端末で :hover が居座って選択状態が見えなくなる問題を防ぐ */
    @media (hover: hover) {
      .palette-tile:hover:not([disabled]):not(.selected) {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(20,18,13,0.20);
      }
    }
    .palette-tile.selected {
      border-color: var(--accent-primary);
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-primary);
      background: #edf7f4;
      z-index: 2;
    }
    .palette-tile.answer-correct {
      border-color: var(--accent-success);
      background: var(--accent-success-bg);
    }
    .palette-tile.answer-extra {
      border-color: var(--accent-error);
      background: var(--accent-error-bg);
    }
    .palette-tile.answer-missed {
      border-color: #d97706;
      background: #fef3c7;
    }
    .palette-tile[disabled] { cursor: default; }

    .submit-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: stretch;
      flex-wrap: wrap;
    }
    .submit-row .primary-btn {
      flex: 0 0 auto;
      min-width: 220px;
      padding-left: 24px;
      padding-right: 24px;
    }
    .submit-row .secondary-btn {
      flex: 0 0 auto;
      min-width: 150px;
    }

    /* ===== 解説の中の小さい牌一覧 ===== */
    .strip {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-top: 4px;
    }
    /* 解説枠内の牌一覧は箇条書き「・」1つ分インデント */
    .explanation .strip {
      margin-left: 1em;
    }
    .tile.tile-mini {
      width: 30px;
      height: 42px;
    }

    /* ===== mode3: 打牌候補一覧テーブル ===== */
    .discard-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.85rem;
      margin-top: 6px;
      overflow: hidden;
    }
    .discard-table th, .discard-table td {
      border-bottom: 1px solid var(--border-tile);
      padding: 6px 1em;
      text-align: left;
      vertical-align: middle;
    }
    .discard-table th:nth-child(1), .discard-table td:nth-child(1),
    .discard-table th:nth-child(2), .discard-table td:nth-child(2) {
      width: 1%;
      white-space: nowrap;
    }
    .discard-table th {
      background: rgba(185,154,78,0.14);
      font-weight: 600;
      color: var(--text-main);
      text-align: center;
    }
    .discard-table .col-count,
    .discard-table th:nth-child(2) {
      text-align: center;
      font-weight: 600;
      white-space: nowrap;
    }
    .discard-table tbody td:first-child {
      text-align: center;
    }
    .discard-table tr.row-best td {
      background: var(--accent-success-bg);
      color: var(--accent-success);
      font-weight: 600;
    }
    .discard-table tr.row-wrong td {
      background: var(--accent-error-bg);
      color: var(--accent-error);
      font-weight: 600;
    }
    .discard-cell {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .ukeire-list {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      align-items: center;
    }
    .discard-table tr.row-hidden {
      display: none;
    }
    .discard-table.expanded tr.row-hidden {
      display: table-row;
    }
    .discard-table tr.row-toggle td {
      background: rgba(185,154,78,0.10);
      text-align: center;
      padding: 0;
    }
    .discard-table tr.row-toggle button {
      width: 100%;
      background: transparent;
      border: none;
      padding: 8px 12px;
      color: var(--text-main);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
    }
    .discard-table tr.row-toggle button:hover {
      background: rgba(185,154,78,0.16);
    }
    .discard-table tr.row-toggle button::after {
      content: ' ▼';
      font-size: 0.75rem;
    }
    .discard-table.expanded tr.row-toggle button::after {
      content: ' ▲';
    }

    /* ===== ホーム画面: 出題元フィルタ ===== */
    .source-filter {
      margin-top: 18px;
      padding: 13px 15px;
      background: rgba(255,255,255,0.075);
      border: 1px solid rgba(185,154,78,0.32);
      border-radius: var(--radius);
      box-shadow: 0 16px 36px rgba(0,0,0,0.20);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      color: rgba(248,243,231,0.84);
      backdrop-filter: blur(10px);
    }
    .source-filter .filter-label {
      font-weight: 600;
      color: var(--text-on-dark);
      margin-right: 4px;
    }
    .source-filter label {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
    }
    .source-filter input {
      accent-color: var(--accent-gold);
    }
    .home-link-row {
      margin-top: 14px;
      text-align: center;
    }
    .home-link-row .secondary-btn {
      flex: 0 0 auto;
      padding: 10px 24px;
    }

    /* ===== 管理画面 (登録 + 一覧) ===== */
    .manage-back { margin-bottom: 12px; }
    .manage-back .secondary-btn {
      flex: 0 0 auto;
      padding: 8px 14px;
      font-size: 0.9rem;
    }
    .section-heading {
      font-size: 1.1rem;
      margin-top: 18px;
      margin-bottom: 10px;
      color: var(--text-on-dark);
      letter-spacing: 0.04em;
    }
    .register-form {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(244,240,230,0.98));
      border: 1px solid rgba(185,154,78,0.42);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 16px;
      margin-bottom: 16px;
    }
    .form-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .form-label {
      font-weight: 600;
      color: var(--text-main);
      min-width: 60px;
      font-size: 0.9rem;
    }
    .hand-count {
      font-size: 0.85rem;
      color: var(--text-sub);
    }
    #register-mode, #register-memo {
      flex: 1;
      padding: 9px 10px;
      border: 1px solid rgba(185,154,78,0.44);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.95rem;
      background: #fffdf8;
      color: var(--text-main);
    }
    #register-mode:focus, #register-memo:focus {
      outline: none;
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 3px var(--accent-gold-soft);
    }

    /* パレットタイルに使用枚数バッジを表示 */
    .palette-tile { position: relative; }
    .palette-count {
      position: absolute;
      top: -4px;
      right: -4px;
      background: linear-gradient(180deg, var(--accent-gold), #8c6d2a);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid white;
    }

    .preview-box {
      background: var(--bg-commentary);
      border: 1px solid rgba(185,154,78,0.28);
      border-left: 4px solid var(--accent-gold);
      padding: 11px 13px;
      border-radius: var(--radius);
      margin: 10px 0;
      font-size: 0.92rem;
    }
    .preview-box p { margin-bottom: 4px; }
    .preview-hint {
      color: var(--text-sub);
      font-size: 0.85rem;
      padding: 8px 0;
      text-align: center;
    }

    .save-notice {
      background: var(--accent-success-bg);
      color: var(--accent-success);
      padding: 8px 12px;
      border-radius: var(--radius);
      margin-top: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .save-notice.error {
      background: var(--accent-error-bg);
      color: var(--accent-error);
    }

    /* 一覧の各カード */
    .problem-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(244,240,230,0.98));
      border: 1px solid rgba(185,154,78,0.36);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 13px;
      margin-bottom: 11px;
    }
    .problem-head {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .mode-tag {
      --mode-accent: var(--accent-primary);
      --mode-accent-strong: var(--accent-primary-strong);
      --mode-accent-soft: var(--accent-primary-soft);
      background: linear-gradient(180deg, var(--mode-accent), var(--mode-accent-strong));
      color: white;
      font-size: 0.78rem;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 1px 0 rgba(255,255,255,0.32) inset, 0 4px 10px var(--mode-accent-soft);
    }
    .mode-tag[data-mode="shanten"] {
      --mode-accent: var(--accent-indigo);
      --mode-accent-strong: #344281;
      --mode-accent-soft: var(--accent-indigo-soft);
    }
    .mode-tag[data-mode="ukeire"] {
      --mode-accent: var(--accent-primary);
      --mode-accent-strong: var(--accent-primary-strong);
      --mode-accent-soft: var(--accent-primary-soft);
    }
    .mode-tag[data-mode="discard"] {
      --mode-accent: var(--accent-brass);
      --mode-accent-strong: #744818;
      --mode-accent-soft: var(--accent-brass-soft);
    }
    .memo-tag {
      font-size: 0.85rem;
      color: var(--text-sub);
    }
    .strip-card-hand {
      margin-bottom: 8px;
      gap: 0;
    }
    .problem-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .secondary-btn.small {
      flex: 0 0 auto;
      padding: 6px 14px;
      font-size: 0.85rem;
      min-width: 0;
    }
    .secondary-btn.danger {
      color: var(--accent-error);
      border-color: var(--accent-error);
    }
    .secondary-btn.danger:hover {
      background: var(--accent-error-bg);
    }
    .empty-msg {
      text-align: center;
      color: rgba(248,243,231,0.70);
      padding: 24px;
      font-size: 0.9rem;
    }

    /* ===== モバイル調整 ===== */
    /* --tile-w/--tile-h は ":root" で 100vw から自動算出されるため、
       ここで上書きしない (上書きすると14枚が1行に収まらなくなる) */
    @media (max-width: 480px) {
      body { padding: 20px 12px 36px; }
      header h1 { font-size: 1.25rem; }
      header p { font-size: 0.82rem; }
      .mode-card { padding: 16px 16px 16px 18px; }
      .mode-card h2 { font-size: 1rem; }
      .mode-card p { font-size: 0.82rem; }
      .hand { padding: 13px 8px; }
      .choice-btn { min-width: 0; min-height: 48px; padding: 10px 6px; font-size: 0.88rem; }
      .palette-tile { width: 34px; height: 48px; }
      .tile.tile-mini { width: 26px; height: 36px; }
      .discard-table { font-size: 0.78rem; }
      .source-filter { gap: 10px; padding: 12px; }
      .source-filter .filter-label { flex-basis: 100%; }
      .submit-row .primary-btn {
        min-width: 0;
        width: auto;
        flex: 1 1 168px;
        min-height: 56px;
        padding: 16px;
        font-size: 1.05rem;
      }
      .submit-row .secondary-btn {
        min-width: 0;
        flex: 1 1 148px;
        min-height: 56px;
        padding: 16px 12px;
        font-size: 0.98rem;
      }
      .form-row { flex-wrap: wrap; }
      .form-label { min-width: 0; }
      .nav-row { gap: 8px; }
    }

    /* ===== 認証バー (Google ログイン UI) ===== */
    .auth-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 4px 0 18px;
      padding: 8px 16px;
      background: var(--bg-panel);
      border: 1px solid rgba(185,154,78,0.3);
      border-radius: 999px;
      color: var(--text-on-dark);
      font-size: 0.85rem;
      max-width: 560px;
      width: 100%;
    }
    .auth-bar .auth-status {
      flex: 1 1 auto;
      min-width: 0;
      color: var(--text-on-dark);
      opacity: 0.9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .auth-bar button {
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--accent-gold);
      background: transparent;
      color: var(--text-on-dark);
      font-weight: 500;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      transition: background 0.15s, color 0.15s;
    }
    .auth-bar button:hover { background: var(--accent-gold-soft); }
    .auth-bar .btn-primary {
      background: var(--accent-gold);
      color: #1c1a14;
    }
    .auth-bar .btn-primary:hover { background: #d2af5a; }

    /* 認証バーはホーム画面のみ表示 */
    body:not(:has([data-screen="home"].active)) .auth-bar { display: none; }
    body:has([data-screen="quiz"].active) > header { display: none; }

    /* ===== スマホ横画面: ホーム / プレイ画面をウィンドウ内に収める ===== */
    @media (orientation: landscape) and (max-height: 520px) and (pointer: coarse) {
      body:has([data-screen="home"].active),
      body:has([data-screen="quiz"].active) {
        --tile-w: min(38px, calc((100vw - 40px) / 14));
        --tile-h: calc(var(--tile-w) * 1.4);
        height: 100dvh;
        min-height: 100dvh;
        overflow: hidden;
        padding: 12px 14px;
        justify-content: flex-start;
      }

      body:has([data-screen="home"].active)::before,
      body:has([data-screen="quiz"].active)::before {
        background-size: 32px 32px;
        mask-image: linear-gradient(to bottom, rgba(0,0,0,0.54), transparent 82%);
      }

      body:has([data-screen="home"].active) > header {
        flex: 0 0 auto;
        margin-bottom: 14px;
      }
      body:has([data-screen="home"].active) > header h1 {
        font-size: clamp(1.45rem, 4vw, 2rem);
        letter-spacing: 0.11em;
        line-height: 1.24;
      }

      body:has([data-screen="home"].active) [data-screen],
      body:has([data-screen="quiz"].active) [data-screen] {
        max-width: min(100%, 980px);
      }

      body:has([data-screen="home"].active) .auth-bar {
        flex: 0 0 auto;
        max-width: 980px;
        min-height: 0;
        margin: 0 0 8px;
        padding: 6px 12px;
        gap: 8px;
        font-size: 0.72rem;
      }
      body:has([data-screen="home"].active) .auth-bar button {
        padding: 4px 10px;
        font-size: 0.72rem;
      }

      [data-screen="home"].active {
        display: grid;
        grid-template-rows: auto auto auto;
        gap: 10px;
        flex: 1 1 auto;
        align-content: start;
        min-height: 0;
      }
      [data-screen="home"] .mode-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 0;
        min-height: 0;
      }
      [data-screen="home"] .mode-card {
        min-width: 0;
        min-height: clamp(150px, 42dvh, 190px);
        padding: 22px 20px 20px 22px;
      }
      [data-screen="home"] .mode-card::after {
        top: 16px;
        right: 16px;
        width: 38px;
        height: 38px;
      }
      [data-screen="home"] .mode-card h2 {
        margin-bottom: 10px;
        padding-right: 42px;
        font-size: clamp(0.96rem, 2.35vw, 1.12rem);
        line-height: 1.24;
        letter-spacing: 0.02em;
      }
      [data-screen="home"] .mode-card p {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
        overflow: hidden;
        font-size: clamp(0.74rem, 1.82vw, 0.84rem);
        line-height: 1.42;
      }
      [data-screen="home"] .source-filter {
        margin-top: 0;
        padding: 7px 10px;
        gap: 8px 12px;
        font-size: 0.76rem;
      }
      [data-screen="home"] .source-filter label {
        font-size: 0.76rem;
      }
      [data-screen="home"] .home-link-row {
        margin-top: 0;
      }
      [data-screen="home"] .home-link-row .secondary-btn {
        padding: 7px 18px;
        font-size: 0.78rem;
      }

      [data-screen="quiz"].active {
        position: relative;
        display: grid;
        grid-template-rows: auto auto auto minmax(0, 1fr) auto auto auto;
        gap: 8px;
        flex: 1 1 auto;
        min-height: 0;
        max-width: min(100%, 980px);
      }
      [data-screen="quiz"].active .quiz-progress {
        padding-left: 72px;
        margin-bottom: 0;
        font-size: 0.78rem;
        line-height: 1.2;
      }
      [data-screen="quiz"].active .hand {
        padding: 8px 10px;
        margin-bottom: 0;
        border-radius: 6px;
      }
      [data-screen="quiz"].active .tile {
        border-radius: 3px;
      }
      [data-screen="quiz"].active .tile.clickable:hover {
        transform: translateY(-1px);
      }
      [data-screen="quiz"].active .prompt {
        margin: 0;
        font-size: 0.94rem;
        line-height: 1.25;
        letter-spacing: 0.02em;
      }
      [data-screen="quiz"].active .answer-area {
        align-content: start;
        gap: 8px;
        min-height: 0;
        margin-bottom: 0;
        overflow: hidden;
      }
      [data-screen="quiz"].active .answer-area:has(.palette) {
        display: grid;
        grid-template-columns: minmax(0, max-content) minmax(78px, 13vw);
        align-items: stretch;
        justify-content: center;
      }
      [data-screen="quiz"].active .choice-btn {
        min-width: 0;
        min-height: 44px;
        padding: 10px 14px;
        font-size: 0.9rem;
        box-shadow: 0 10px 22px rgba(0,0,0,0.20);
      }
      [data-screen="quiz"].active .choice-btn:hover:not([disabled]) {
        transform: none;
      }
      [data-screen="quiz"].active .palette {
        --landscape-palette-gap: clamp(1px, 0.25vw, 2px);
        --landscape-palette-pad-x: 6px;
        --landscape-palette-tile-w: clamp(24px, min(11.5dvh, calc((100vw - 142px) / 13)), 46px);
        width: max-content;
        max-width: 100%;
        padding: 5px var(--landscape-palette-pad-x);
        margin-bottom: 0;
        border-radius: 6px;
        display: grid;
        grid-template-columns: repeat(13, var(--landscape-palette-tile-w));
        grid-auto-rows: calc(var(--landscape-palette-tile-w) * 1.4);
        gap: var(--landscape-palette-gap);
        justify-content: center;
      }
      [data-screen="quiz"].active .palette-row {
        display: contents;
        margin-bottom: 0;
      }
      [data-screen="quiz"].active .palette-tile {
        width: var(--landscape-palette-tile-w);
        height: calc(var(--landscape-palette-tile-w) * 1.4);
        border-width: 1px;
        border-radius: 3px;
      }
      [data-screen="quiz"].active .palette-row:nth-child(1) .palette-tile {
        grid-row: 1;
      }
      [data-screen="quiz"].active .palette-row:nth-child(2) .palette-tile {
        grid-row: 2;
      }
      [data-screen="quiz"].active .palette-row:nth-child(3) .palette-tile {
        grid-row: 3;
      }
      [data-screen="quiz"].active .palette-row:nth-child(4) .palette-tile:nth-child(1) {
        grid-row: 1;
        grid-column: 10;
      }
      [data-screen="quiz"].active .palette-row:nth-child(4) .palette-tile:nth-child(2) {
        grid-row: 1;
        grid-column: 11;
      }
      [data-screen="quiz"].active .palette-row:nth-child(4) .palette-tile:nth-child(3) {
        grid-row: 1;
        grid-column: 12;
      }
      [data-screen="quiz"].active .palette-row:nth-child(4) .palette-tile:nth-child(4) {
        grid-row: 1;
        grid-column: 13;
      }
      [data-screen="quiz"].active .palette-row:nth-child(4) .palette-tile:nth-child(5) {
        grid-row: 2;
        grid-column: 11;
      }
      [data-screen="quiz"].active .palette-row:nth-child(4) .palette-tile:nth-child(6) {
        grid-row: 2;
        grid-column: 12;
      }
      [data-screen="quiz"].active .palette-row:nth-child(4) .palette-tile:nth-child(7) {
        grid-row: 2;
        grid-column: 13;
      }
      [data-screen="quiz"].active .palette-tile.selected {
        box-shadow: 0 0 0 2px var(--accent-primary);
      }
      [data-screen="quiz"].active .submit-row {
        gap: 9px;
        flex-wrap: nowrap;
      }
      [data-screen="quiz"].active .answer-area:has(.palette) .submit-row {
        flex-direction: column;
      }
      [data-screen="quiz"].active .submit-row .primary-btn,
      [data-screen="quiz"].active .submit-row .secondary-btn {
        flex: 1 1 0;
        min-width: 0;
        min-height: 38px;
        padding: 9px 13px;
        font-size: 0.86rem;
      }
      [data-screen="quiz"].active #result-badge {
        min-height: 0;
      }
      [data-screen="quiz"].active #explanation {
        min-height: 0;
        overflow: hidden;
      }
      [data-screen="quiz"].active .explanation {
        max-height: 100%;
        margin-bottom: 0;
        padding: 12px 14px;
        border-left-width: 3px;
        border-radius: 6px;
        font-size: 0.82rem;
        line-height: 1.36;
        overflow: hidden;
        box-shadow: 0 10px 22px rgba(0,0,0,0.20);
      }
      [data-screen="quiz"].active .explanation p + p {
        margin-top: 4px;
      }
      [data-screen="quiz"].active .explanation .result-heading {
        margin-bottom: 8px;
        padding-bottom: 8px;
        font-size: 1.16rem;
        line-height: 1.18;
      }
      [data-screen="quiz"].active .explanation .result-heading:only-child {
        display: flex;
        align-items: center;
        min-height: 2rem;
        margin-bottom: 0;
        padding: 2px 0 3px;
        border-bottom: none;
      }
      [data-screen="quiz"].active .explanation .strip {
        margin-left: 0.7em;
      }
      [data-screen="quiz"].active .strip {
        margin-top: 4px;
      }
      [data-screen="quiz"].active .tile.tile-mini {
        width: 24px;
        height: 34px;
      }
      [data-screen="quiz"].active .discard-table {
        display: block;
        max-height: 132px;
        margin-top: 6px;
        overflow-y: auto;
        border-collapse: separate;
        font-size: 0.72rem;
      }
      [data-screen="quiz"].active .discard-table thead,
      [data-screen="quiz"].active .discard-table tbody,
      [data-screen="quiz"].active .discard-table tr {
        display: table;
        width: 100%;
        table-layout: fixed;
      }
      [data-screen="quiz"].active .discard-table th,
      [data-screen="quiz"].active .discard-table td {
        padding: 3px 0.45em;
      }
      [data-screen="quiz"].active .discard-table th:nth-child(1),
      [data-screen="quiz"].active .discard-table td:nth-child(1),
      [data-screen="quiz"].active .discard-table th:nth-child(2),
      [data-screen="quiz"].active .discard-table td:nth-child(2) {
        width: 40px;
      }
      [data-screen="quiz"].active .discard-table tr.row-toggle button {
        padding: 5px 8px;
        font-size: 0.72rem;
      }
      [data-screen="quiz"].active .ukeire-list {
        gap: 1px;
      }
      [data-screen="quiz"].active .nav-row {
        height: 0;
        min-height: 0;
        gap: 8px;
        overflow: visible;
      }
      [data-screen="quiz"].active .secondary-btn,
      [data-screen="quiz"].active .primary-btn {
        min-height: 38px;
        padding: 9px 14px;
        font-size: 0.86rem;
        border-radius: 6px;
        box-shadow: 0 10px 22px rgba(0,0,0,0.20);
      }
      [data-screen="quiz"].active #home-btn,
      [data-screen="quiz"].active [data-action="back-home"] {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 20;
        flex: 0 0 auto;
        width: auto;
        min-height: 0;
        padding: 5px 10px;
        font-size: 0.74rem;
        box-shadow: none;
      }
      [data-screen="quiz"].active .nav-row:has(#next-btn:not(.hidden)) {
        height: auto;
      }
      [data-screen="quiz"].active .nav-row:has(#next-btn:not(.hidden)) #home-btn {
        position: static;
        flex: 1 1 0;
        width: auto;
        min-height: 38px;
        padding: 9px 14px;
        font-size: 0.86rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>麻雀 手牌トレーニング</h1>
  </header>

  <div class="auth-bar" id="auth-bar">
    <span class="auth-status" id="auth-status">認証確認中…</span>
    <button type="button" class="btn-primary" id="btn-signin" style="display:none">Googleでログイン</button>
    <button type="button" id="btn-signout" style="display:none">ログアウト</button>
  </div>

  <!-- ===== ホーム画面 ===== -->
  <section data-screen="home" class="active">
    <div class="mode-list">
      <button type="button" class="mode-card" data-start-mode="shanten">
        <h2>シャンテン判定</h2>
        <p>13枚の手牌を見て、テンパイ／1シャンテン／2シャンテンを3択で答えます。</p>
      </button>
      <button type="button" class="mode-card" data-start-mode="ukeire">
        <h2>受け入れ種類</h2>
        <p>受け入れ牌（シャンテンを進める牌）の種類を全てパレットから選びます。</p>
      </button>
      <button type="button" class="mode-card" data-start-mode="discard">
        <h2>最大受け入れ打牌</h2>
        <p>14枚の手牌から、受け入れが最大になる打牌をクリックで選びます。同点正解は全て○。</p>
      </button>
    </div>

    <div class="source-filter" id="source-filter">
      <span class="filter-label">出題元</span>
      <label><input type="radio" name="source" value="random">ランダムのみ</label>
      <label><input type="radio" name="source" value="user">登録問題のみ</label>
      <label><input type="radio" name="source" value="both">両方ミックス</label>
    </div>

    <div class="home-link-row">
      <button type="button" class="secondary-btn" data-action="manage">問題を登録 ／ 一覧</button>
    </div>
  </section>

  <!-- ===== 管理画面 (登録 + 一覧) ===== -->
  <section data-screen="manage">
    <div class="manage-back">
      <button type="button" class="secondary-btn" data-action="back-home">← ホーム</button>
    </div>

    <h2 class="section-heading" id="register-heading">問題の登録</h2>
    <div class="register-form">
      <div class="form-row">
        <label class="form-label" for="register-mode">モード</label>
        <select id="register-mode">
          <option value="shanten">シャンテン判定 (13枚)</option>
          <option value="ukeire">受け入れ種類 (13枚)</option>
          <option value="discard">最大受け入れ打牌 (14枚)</option>
        </select>
      </div>
      <div class="form-row">
        <span class="form-label">手牌</span>
        <span id="register-hand-count" class="hand-count">0/13 枚</span>
      </div>
      <div class="hand" id="register-hand"></div>
      <div class="palette" id="register-palette"></div>
      <div class="form-row">
        <label class="form-label" for="register-memo">メモ</label>
        <input type="text" id="register-memo" placeholder="任意 (40文字まで)" maxlength="40">
      </div>
      <div id="register-preview"></div>
      <div class="nav-row">
        <button type="button" class="secondary-btn" id="register-clear">クリア</button>
